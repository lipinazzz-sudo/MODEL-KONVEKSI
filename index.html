<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Konveksi Owlet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .modal { display: none; position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); cursor: zoom-out; }
        .modal-isi { margin: auto; display: block; max-width: 90%; max-height: 90%; margin-top: 3%; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
    <div id="modalZoom" class="modal" onclick="this.style.display='none'">
        <img class="modal-isi" id="gambarBesar">
    </div>
    
    <div id="slideContainer" class="p-6"></div>

    <script>
        let database = [];
        let currentSlideIndex = 0;

        function bukaModal(src) {
            document.getElementById("gambarBesar").src = src;
            document.getElementById("modalZoom").style.display = "block";
        }

        async function fetchSheetData() {
            try {
                const res = await fetch("https://docs.google.com/spreadsheets/d/1L24DsxwQ0uLxblnKzJ3YzH91gnsXuEhb8OVcRsH3WNo/export?format=csv&gid=0");
                const text = await res.text();
                const rows = text.split('\n').map(row => row.split(','));
                
                // Memastikan data valid sebelum diproses
                database = rows.slice(1).filter(row => row[0]).map(row => ({ 
                    name: row[0] || "", 
                    image: row[4] || "" // Mengambil dari kolom E (indeks 4)
                }));
                
                if (database.length > 0) renderSlide();
            } catch (e) { console.error(e); }
        }

        function renderSlide() {
            if (!database[currentSlideIndex]) return;
            const model = database[currentSlideIndex];
            document.getElementById('slideContainer').innerHTML = `
                <div class="bg-slate-900 p-8 rounded-2xl">
                    <h1 class="text-2xl font-bold">${model.name}</h1>
                    <img src="${model.image}" class="w-full max-w-md rounded-xl cursor-pointer mt-4" 
                         onclick="bukaModal('${model.image}')" onerror="this.src='https://via.placeholder.com/400'">
                </div>
            `;
        }

        fetchSheetData();
    </script>
</body>
</html>
