<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog & Kalkulasi - Owlet Atelier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        /* Kustomisasi scrollbar untuk tampilan premium */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body class="bg-slate-950 text-slate-300 min-h-screen flex flex-col justify-start items-center p-4 md:p-6 overflow-x-hidden relative selection:bg-teal-900 selection:text-teal-100">
    
    <div id="imageModal" class="fixed inset-0 z-[200] hidden bg-slate-950/95 backdrop-blur-md items-center justify-center p-4 overflow-hidden touch-none" onclick="closeZoom()">
        <img id="modalImg" src="" 
             class="max-w-full max-h-[90vh] object-contain rounded-lg shadow-2xl transition-transform duration-300 cursor-zoom-in relative" 
             onclick="toggleZoom(event)"
             onmousedown="startDrag(event)" onmousemove="onDrag(event)" onmouseup="endDrag()" onmouseleave="endDrag()"
             ontouchstart="startDrag(event)" ontouchmove="onDrag(event)" ontouchend="endDrag()">
        
        <div class="absolute top-5 right-5 flex flex-col gap-2 items-end pointer-events-none">
            <div class="text-slate-300 text-[10px] md:text-[11px] font-bold uppercase tracking-widest bg-slate-900/80 px-4 py-2 rounded-full border border-slate-700 backdrop-blur">
                🔍 Klik untuk Zoom | Tahan & Geser
            </div>
        </div>
    </div>

    <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_right,rgba(20,184,166,0.04),transparent_50%)] pointer-events-none"></div>

    <header class="w-full max-w-7xl flex flex-col md:flex-row justify-between items-center gap-4 mb-6 relative z-50 bg-slate-900/50 border border-slate-800/80 p-4 rounded-2xl backdrop-blur-md shadow-lg shadow-slate-900/50">
        <div class="flex items-center gap-3 shrink-0 w-full md:w-auto justify-center md:justify-start">
            <div class="w-11 h-11 rounded-full bg-slate-800 border border-slate-700 flex items-center justify-center text-xl shadow-inner">🦉</div>
            <div>
                <h1 class="text-sm font-bold tracking-tight text-slate-200">Owlet Atelier</h1>
                <p class="text-[10px] text-teal-500 flex items-center gap-1.5 uppercase font-semibold tracking-wider justify-center md:justify-start mt-0.5">
                    <span class="w-1.5 h-1.5 rounded-full bg-teal-500 animate-pulse"></span> Live System
                </p>
            </div>
        </div>

        <div class="text-center md:flex-1 px-4" id="headerModelTitle">
            <span class="text-[10px] font-semibold uppercase tracking-widest text-slate-500 block">Status Koneksi</span>
            <h2 class="text-lg font-bold tracking-wide text-slate-300 uppercase mt-1">- MEMUAT DATA -</h2>
        </div>
        
        <div class="w-full md:w-72 relative z-50 shrink-0">
            <div class="relative group">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-500 text-sm transition group-focus-within:text-teal-500">🔍</span>
                <input type="text" id="searchInput" oninput="searchModel(this.value)" placeholder="Cari model katalog..." class="w-full bg-slate-950/80 border border-slate-800 rounded-xl pl-10 pr-4 py-3 md:py-2.5 text-xs text-slate-200 placeholder-slate-500 focus:outline-none focus:border-teal-600 focus:ring-1 focus:ring-teal-600 transition-all shadow-inner">
            </div>
            <div id="searchDropdown" class="absolute left-0 right-0 mt-2 bg-slate-900 border border-slate-700 rounded-xl overflow-hidden shadow-2xl hidden z-50 max-h-60 overflow-y-auto divide-y divide-slate-800/80"></div>
        </div>
    </header>

    <div id="slideContainer" class="w-full max-w-7xl bg-slate-900/60 backdrop-blur-sm border border-slate-800/80 rounded-2xl shadow-2xl relative z-10 min-h-[400px] md:min-h-[500px] flex flex-col justify-center transition-all duration-300">
        <div class="text-center py-24 text-slate-400 text-sm flex flex-col items-center gap-4">
            <div class="w-8 h-8 border-2 border-teal-600 border-t-transparent rounded-full animate-spin"></div>
            <span class="font-medium tracking-wide text-xs">Menyinkronkan data dari Cloud...</span>
        </div>
    </div>

    <nav class="mt-8 flex items-center gap-5 z-30 bg-slate-900/80 backdrop-blur-md border border-slate-700/60 p-2 rounded-full shadow-2xl sticky bottom-6 transition-all duration-300">
        <button onclick="prevSlide()" aria-label="Model Sebelumnya" class="w-11 h-11 md:w-10 md:h-10 flex items-center justify-center rounded-full border border-slate-700 bg-slate-950 text-slate-400 hover:text-teal-400 hover:border-teal-600 active:scale-95 transition-all duration-200">
            <span class="text-lg font-bold select-none">←</span>
        </button>
        <span class="text-[11px] font-bold text-slate-300 tracking-widest uppercase px-3 select-none" id="slideIndicator">Memuat...</span>
        <button onclick="nextSlide()" aria-label="Model Selanjutnya" class="w-11 h-11 md:w-10 md:h-10 flex items-center justify-center rounded-full border border-slate-700 bg-slate-950 text-slate-400 hover:text-teal-400 hover:border-teal-600 active:scale-95 transition-all duration-200">
            <span class="text-lg font-bold select-none">→</span>
        </button>
    </nav>

    <a href="#" onclick="sendWhatsAppActiveModel(); return false;" class="fixed bottom-6 right-6 z-[100] bg-teal-600 hover:bg-teal-500 text-white p-3.5 md:p-4 rounded-full shadow-[0_4px_20px_rgba(13,148,136,0.4)] transition-all transform hover:scale-105 flex items-center justify-center group border border-teal-400/30">
        <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24">
            <path d="M12.031 0C5.383 0 0 5.383 0 12.031c0 2.124.552 4.186 1.6 6L.057 24l6.163-1.687c1.782.946 3.791 1.447 5.811 1.447 6.648 0 12.031-5.383 12.031-12.031C24.062 5.383 18.679 0 12.031 0zm0 21.821c-1.802 0-3.564-.484-5.115-1.404l-.367-.218-3.805 1.043 1.018-3.707-.238-.379C2.56 15.541 2.042 13.803 2.042 12.031c0-5.508 4.482-9.989 9.989-9.989 5.508 0 9.989 4.481 9.989 9.989 0 5.508-4.481 9.989-9.989 9.989zm5.485-7.489c-.3-.15-1.782-.878-2.059-.979-.277-.101-.479-.15-.681.15-.202.301-.78 1.002-.956 1.203-.176.202-.352.227-.653.076-1.503-.755-2.617-1.378-3.593-2.65-.251-.326.023-.312.302-.871.076-.151.038-.282-.038-.433-.076-.151-.681-1.644-.933-2.253-.245-.593-.493-.513-.681-.523-.176-.01-.378-.01-.58-.01-.202 0-.528.076-.804.377-.277.301-1.056 1.03-1.056 2.511 0 1.481 1.082 2.912 1.233 3.113.151.202 2.124 3.242 5.143 4.545 2.146.924 2.898.98 3.864.829.966-.151 2.766-1.129 3.155-2.219.389-1.09.389-2.025.277-2.219-.112-.194-.414-.295-.715-.445z"/>
        </svg>
        <span class="absolute right-16 bg-slate-800 text-slate-200 text-xs font-semibold px-3 py-2 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none shadow-xl border border-slate-700">Tanya Model Ini</span>
    </a>

    <script>
        const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1L24DsxwQ0uLxblnKzJ3YzH91gnsXuEhb8OVcRsH3WNo/edit?gid=0#gid=0"

        let database = [];
        let highlightedIndex = -1;
        let currentSlideIndex = 0;
        let isFetching = false;
        const orderedCategories = ["OBRAS", "JAHIT", "KAM", "KARET", "BIS", "NECCI", "PACKING"];
        const DEFAULT_IMAGE = "https://images.unsplash.com/photo-1558769132-cb1aea458c5e?q=80&w=600&auto=format&fit=crop";

        function escapeHTML(str) {
            if (!str) return "";
            return str.replace(/[&<>"']/g, function(match) {
                const mask = { '&': '&amp;', '<': '&lt;', '>', '&gt;', '"': '&quot;', "'": '&#039;' };
                return mask[match];
            });
        }

        // ==========================================
        // FUNGSI ZOOM, FULLSCREEN & DRAG (GESER)
        // ==========================================
        let isZoomed = false;
        let scaleValue = 1;
        let isDragging = false;
        let dragMoved = false; 
        let startX, startY, translateX = 0, translateY = 0;

        function updateTransform() {
            const modalImg = document.getElementById('modalImg');
            modalImg.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scaleValue})`;
        }

        window.openZoom = function(imgSrc) {
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImg');
            
            modalImg.src = imgSrc;
            isZoomed = false;
            scaleValue = 1;
            translateX = 0;
            translateY = 0;
            updateTransform();
            
            modalImg.className = "max-w-full max-h-[90vh] object-contain rounded-lg shadow-2xl transition-transform duration-300 cursor-zoom-in relative";
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.style.overflow = 'hidden'; 
        };

        window.closeZoom = function() {
            const modal = document.getElementById('imageModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.body.style.overflow = ''; 
        };

        window.toggleZoom = function(event) {
            event.stopPropagation(); 
            if (dragMoved) { dragMoved = false; return; }

            const modalImg = document.getElementById('modalImg');
            isZoomed = !isZoomed;

            if (isZoomed) {
                scaleValue = 2;
                modalImg.classList.remove('cursor-zoom-in');
                modalImg.classList.add('cursor-grab');
            } else {
                scaleValue = 1;
                translateX = 0;
                translateY = 0;
                modalImg.classList.remove('cursor-grab', 'cursor-grabbing');
                modalImg.classList.add('cursor-zoom-in');
            }
            updateTransform();
        };

        window.startDrag = function(event) {
            if (!isZoomed) return;
            if(event.cancelable) event.preventDefault(); 
            
            isDragging = true;
            dragMoved = false; 
            
            const clientX = event.touches ? event.touches[0].clientX : event.clientX;
            const clientY = event.touches ? event.touches[0].clientY : event.clientY;

            startX = clientX - translateX;
            startY = clientY - translateY;
            
            const modalImg = document.getElementById('modalImg');
            modalImg.classList.replace('cursor-grab', 'cursor-grabbing');
            modalImg.classList.remove('transition-transform', 'duration-300'); 
        };

        window.onDrag = function(event) {
            if (!isDragging || !isZoomed) return;
            dragMoved = true; 
            
            const clientX = event.touches ? event.touches[0].clientX : event.clientX;
            const clientY = event.touches ? event.touches[0].clientY : event.clientY;

            translateX = clientX - startX;
            translateY = clientY - startY;
            updateTransform();
        };

        window.endDrag = function() {
            if (!isDragging) return;
            isDragging = false;
            
            const modalImg = document.getElementById('modalImg');
            modalImg.classList.replace('cursor-grabbing', 'cursor-grab');
            modalImg.classList.add('transition-transform', 'duration-300'); 
        };
        // ==========================================

        function getCategoryStyle(cat) {
            const styles = {
                "OBRAS": "text-amber-400 bg-amber-500/10 border border-amber-500/20",
                "JAHIT": "text-teal-400 bg-teal-500/10 border border-teal-500/20",
                "KAM": "text-sky-400 bg-sky-500/10 border border-sky-500/20",
                "KARET": "text-purple-400 bg-purple-500/10 border border-purple-500/20",
                "BIS": "text-pink-400 bg-pink-500/10 border border-pink-500/20",
                "NECCI": "text-emerald-400 bg-emerald-500/10 border border-emerald-500/20",
                "PACKING": "text-slate-300 bg-slate-500/10 border border-slate-500/20"
            };
            return styles[cat] || "text-slate-400 bg-slate-800/50 border border-slate-700";
        }

        function konversiLinkDrive(url) {
            if (!url) return "";
            if (url.includes("drive.google.com")) {
                const match = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
                if (match && match[1]) {
                    return `https://docs.google.com/uc?export=view&id=${match[1]}`; 
                }
            }
            return url;
        }

        function parseCSVToJSON(csvText) {
            const lines = csvText.split(/\r?\n/);
            const modelsMap = {};
            const firstLine = lines[0] || "";
            const delimiter = firstLine.includes(";") ? ";" : ",";

            for (let i = 1; i < lines.length; i++) {
                let line = lines[i].trim();
                if (!line) continue;
                
                let columns = [];
                let inQuotes = false;
                let currentColumn = "";

                for (let j = 0; j < line.length; j++) {
                    let char = line[j];
                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === delimiter && !inQuotes) {
                        columns.push(currentColumn.trim());
                        currentColumn = "";
                    } else {
                        currentColumn += char;
                    }
                }
                columns.push(currentColumn.trim());

                if (columns.length < 4) continue;

                const modelName = columns[0].replace(/^"|"$/g, '').trim();
                const category = columns[1].replace(/^"|"$/g, '').trim().toUpperCase();
                const details = columns[2].replace(/^"|"$/g, '').trim();
                const price = parseInt(columns[3].replace(/[^0-9]/g, '')) || 0;
                let imageUrl = (columns[4] && columns[4].trim()) ? columns[4].replace(/^"|"$/g, '').trim() : "";

                if (!modelName) continue;

                if (!modelsMap[modelName]) {
                    modelsMap[modelName] = { name: modelName, items: [], image: "" };
                }
                
                modelsMap[modelName].items.push({ category, details, price });
                
                if (imageUrl && !modelsMap[modelName].image) {
                    modelsMap[modelName].image = konversiLinkDrive(imageUrl);
                }
            }
            return Object.values(modelsMap);
        }

        async function fetchSheetData() {
            if (isFetching) return; 
            isFetching = true;

            try {
                const response = await fetch(GOOGLE_SHEET_CSV_URL + "&cache_buster=" + Date.now());
                if (!response.ok) throw new Error("Gagal mengambil data (Status: " + response.status + ")");
                
                const csvText = await response.text();
                if (!csvText.trim() || csvText.includes("<!DOCTYPE html>")) {
                    throw new Error("Akses ditolak atau dokumen belum di-Publish ke Web.");
                }

                const oldModelName = database[currentSlideIndex]?.name;
                database = parseCSVToJSON(csvText);

                if (database.length > 0) {
                    if (oldModelName) {
                        const newIndex = database.findIndex(m => m.name === oldModelName);
                        if (newIndex !== -1) currentSlideIndex = newIndex;
                    }
                    renderSlide();
                } else {
                    document.getElementById('slideContainer').innerHTML = '<div class="text-center py-24 text-amber-400 text-xs">⚠️ Tabel data kosong atau format kolom salah.</div>';
                }
            } catch (error) {
                console.error(error);
                document.getElementById('slideContainer').innerHTML = `
                    <div class="text-center py-20 text-red-400 text-xs flex flex-col items-center gap-2">
                        <span class="text-lg">❌ Koneksi Cloud Tertahan</span>
                        <span class="text-[11px] text-slate-500 max-w-md mt-1">${error.message}</span>
                        <button onclick="fetchSheetData()" class="mt-5 bg-slate-800 text-slate-300 border border-slate-700 px-4 py-1.5 rounded-xl text-[10px] hover:bg-slate-700 transition">Coba Hubungkan Ulang</button>
                    </div>
                `;
            } finally {
                isFetching = false;
            }
        }

        window.sendWhatsAppActiveModel = function() {
            const model = database[currentSlideIndex];
            if (!model) return;

            const targetPhoneNumber = "6281234567890"; // Ganti dengan nomor WhatsApp operasional Anda
            
            let messageText = `Halo Admin Owlet Atelier 🦉,\n`;
            messageText += `Saya ingin mendiskusikan rincian harga kerja untuk model berikut:\n\n`;
            messageText += `📦 *MODEL: ${model.name.toUpperCase()}*\n`;
            messageText += `🪵 ───────────────────────\n`;

            let countedTotal = 0;
            orderedCategories.forEach(cat => {
                const filtered = model.items.filter(item => item.category === cat);
                if (filtered.length > 0) {
                    messageText += `\n*${cat}* 🌿\n`;
                    filtered.forEach(item => {
                        messageText += `  • ${item.details} -> Rp ${item.price.toLocaleString('id-ID')}\n`;
                        countedTotal += item.price;
                    });
                }
            });

            messageText += `\n🪵 ───────────────────────\n`;
            messageText += `💰 *TOTAL HPP:* Rp ${countedTotal.toLocaleString('id-ID')}\n\n`;
            messageText += `Mohon informasi jadwal antrean slot produksinya. Terima kasih!`;

            const encodedMessage = encodeURIComponent(messageText);
            const nativeWhatsAppUrl = `https://api.whatsapp.com/send?phone=${targetPhoneNumber}&text=${encodedMessage}`;
            
            window.open(nativeWhatsAppUrl, '_blank');
        };

        function renderSlide() {
            const container = document.getElementById('slideContainer');
            if (database.length === 0) return;

            if (currentSlideIndex >= database.length) currentSlideIndex = database.length - 1;
            const model = database[currentSlideIndex];
            const totalHpp = model.items.reduce((sum, item) => sum + item.price, 0);

            document.getElementById('headerModelTitle').innerHTML = `
                <span class="text-[10px] font-semibold uppercase tracking-widest text-teal-500 block">Katalog Terpilih</span>
                <h2 class="text-xl md:text-2xl font-bold tracking-tight text-white uppercase mt-0.5">${escapeHTML(model.name)}</h2>
            `;

            const currentImg = model.image ? model.image : DEFAULT_IMAGE;

            let rowsHtml = '';
            orderedCategories.forEach(cat => {
                const catItems = model.items.filter(item => item.category === cat);
                if (catItems.length > 0) {
                    let catTotal = 0;
                    catItems.forEach(item => {
                        catTotal += item.price;
                        rowsHtml += `
                            <tr class="border-b border-slate-800/50 hover:bg-slate-800/30 transition-colors duration-200">
                                <td class="py-3 md:py-2.5 px-4 whitespace-nowrap">
                                    <span class="text-[9px] font-bold tracking-wider px-2 py-1 rounded ${getCategoryStyle(item.category)}">${escapeHTML(item.category)}</span>
                                </td>
                                <td class="py-3 md:py-2.5 px-4 text-xs text-slate-300 leading-relaxed min-w-[140px]">
                                    ${escapeHTML(item.details)}
                                </td>
                                <td class="py-3 md:py-2.5 px-4 text-right font-mono text-slate-300 text-xs tracking-wide whitespace-nowrap">
                                    Rp ${item.price.toLocaleString('id-ID')}
                                </td>
                            </tr>
                        `;
                    });
                    rowsHtml += `
                        <tr class="bg-slate-900/40 border-b border-slate-800/80 font-medium text-slate-400 text-[10px]">
                            <td colspan="2" class="py-2.5 px-5 italic text-right text-slate-500 select-none">Subtotal ${escapeHTML(cat)} :</td>
                            <td class="py-2.5 px-4 text-right font-mono text-teal-400/90 font-bold whitespace-nowrap">Rp ${catTotal.toLocaleString('id-ID')}</td>
                        </tr>
                    `;
                }
            });

            container.innerHTML = `
                <div class="w-full flex flex-col md:flex-row gap-5 md:gap-6 p-4 md:p-6 rounded-2xl relative">
                    
                    <div class="w-full h-64 md:w-2/5 md:h-[460px] bg-slate-950/80 border border-slate-800 rounded-xl overflow-hidden flex items-center justify-center p-2 shrink-0 relative group shadow-inner">
                        <span class="absolute top-3 right-3 md:hidden bg-slate-900/90 text-slate-400 text-[9px] px-2 py-1 rounded-full border border-slate-700 backdrop-blur z-10 select-none">🔍 Tap Zoom</span>
                        <img src="${currentImg}" alt="Foto Model" onclick="openZoom(this.src)" class="w-full h-full object-contain cursor-zoom-in group-hover:scale-[1.02] transition duration-500" onerror="this.src='${DEFAULT_IMAGE}'">
                    </div>

                    <div class="w-full md:w-3/5 flex flex-col gap-4 overflow-hidden relative">
                        
                        <div class="flex items-center gap-2 px-1 text-[10px] uppercase font-semibold tracking-widest text-slate-400 select-none">
                            <span class="flex items-center gap-1.5 text-teal-500/80">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                                Rincian Kerja
                            </span>
                        </div>
                        
                        <div class="flex-1 bg-slate-950/50 border border-slate-800/80 rounded-xl overflow-hidden shadow-inner relative flex flex-col">
                            
                            <div class="absolute top-0 right-0 w-32 h-32 pointer-events-none z-20 opacity-30">
                                <svg viewBox="0 0 100 100" class="w-full h-full">
                                    <path d="M100 20 Q 70 30 40 40 Q 20 45 0 50" fill="none" stroke="#0d9488" stroke-width="1.5" stroke-linecap="round"/>
                                    <path d="M70 30 Q 60 15 50 10" fill="none" stroke="#0d9488" stroke-width="1" stroke-linecap="round"/>
                                    <circle cx="50" cy="5" r="4" fill="#0d9488"/>
                                    <circle cx="48.5" cy="4" r="0.8" fill="#022c22"/>
                                    <circle cx="51.5" cy="4" r="0.8" fill="#022c22"/>
                                    <path d="M50 7 L49 9 L51 9 Z" fill="#022c22"/>
                                </svg>
                            </div>

                            <div class="overflow-y-auto overflow-x-auto min-h-[260px] max-h-[350px] md:max-h-[380px] z-10 relative">
                                <table class="w-full text-left border-collapse min-w-[340px]">
                                    <thead class="bg-slate-900/90 sticky top-0 z-10 backdrop-blur-md border-b border-slate-800 shadow-sm">
                                        <tr class="text-[9px] text-slate-400 uppercase tracking-wider">
                                            <th class="py-3 px-4 whitespace-nowrap font-semibold">Kategori</th>
                                            <th class="py-3 px-4 font-semibold">Spesifikasi</th>
                                            <th class="py-3 px-4 text-right whitespace-nowrap font-semibold">Harga</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-slate-800/50">${rowsHtml}</tbody>
                                </table>
                            </div>
                        </div>

                        <div class="bg-slate-950/80 border border-slate-800 p-4 rounded-xl flex justify-between items-center shrink-0 mt-auto shadow-inner">
                            <span class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Total HPP Produksi</span>
                            <span class="text-xl md:text-2xl font-black text-teal-400 font-mono tracking-tight">Rp ${totalHpp.toLocaleString('id-ID')}</span>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('slideIndicator').innerText = `Katalog ${currentSlideIndex + 1} dari ${database.length}`;
        }

        window.searchModel = function(query) {
            const dropdown = document.getElementById('searchDropdown');
            highlightedIndex = -1; 
            
            if (!query.trim()) { dropdown.classList.add('hidden'); return; }

            const results = database.filter(m => m.name.toLowerCase().includes(query.toLowerCase()));
            dropdown.innerHTML = '';
            
            if (results.length === 0) {
                dropdown.innerHTML = '<div class="p-4 text-xs text-slate-500 italic text-center select-none">Model tidak ditemukan</div>';
            } else {
                results.forEach((model) => {
                    const div = document.createElement('div');
                    div.className = "search-item p-3 px-4 text-xs text-slate-300 hover:bg-slate-800 cursor-pointer transition flex justify-between items-center";
                    div.innerHTML = `<span class="font-bold uppercase tracking-wide">${escapeHTML(model.name)}</span>`;
                    div.onclick = () => selectModel(model);
                    dropdown.appendChild(div);
                });
            }
            dropdown.classList.remove('hidden');
        }

        function selectModel(model) {
            currentSlideIndex = database.findIndex(m => m.name === model.name);
            document.getElementById('searchDropdown').classList.add('hidden');
            document.getElementById('searchInput').value = '';
            renderSlide();
        }

        document.getElementById('searchInput').addEventListener('keydown', function(e) {
            const items = document.querySelectorAll('.search-item');
            if (items.length === 0) return;

            if (e.key === 'ArrowDown') {
                e.preventDefault();
                highlightedIndex = (highlightedIndex + 1) % items.length;
                updateHighlight(items);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                highlightedIndex = (highlightedIndex - 1 + items.length) % items.length;
                updateHighlight(items);
            } else if (e.key === 'Enter') {
                e.preventDefault();
                if (highlightedIndex >= 0) items[highlightedIndex].click();
            }
        });

        function updateHighlight(items) {
            items.forEach((item, idx) => {
                item.classList.toggle('bg-slate-800', idx === highlightedIndex);
                if (idx === highlightedIndex) item.scrollIntoView({ block: 'nearest' });
            });
        }

        document.addEventListener('keydown', function(event) {
            if (document.activeElement === document.getElementById('searchInput')) return; 
            if (event.key === 'ArrowRight') nextSlide();
            else if (event.key === 'ArrowLeft') prevSlide();
        });

        window.nextSlide = function() { if (currentSlideIndex < database.length - 1) { currentSlideIndex++; renderSlide(); } }
        window.prevSlide = function() { if (currentSlideIndex > 0) { currentSlideIndex--; renderSlide(); } }

        document.addEventListener('click', e => { if (!e.target.closest('#searchInput')) document.getElementById('searchDropdown').classList.add('hidden'); });

        // LOGIKA SWIPE UNTUK HP
        let touchStartX = 0;
        let touchStartY = 0;

        document.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, { passive: true });

        document.addEventListener('touchend', e => {
            if (!document.getElementById('imageModal').classList.contains('hidden')) return;
            if (e.target.closest('table') || e.target.closest('.overflow-x-auto')) return;
            if (e.target.closest('input')) return; 

            const touchEndX = e.changedTouches[0].screenX;
            const touchEndY = e.changedTouches[0].screenY;
            
            const deltaX = touchEndX - touchStartX;
            const deltaY = touchEndY - touchStartY;

            if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > 50) {
                if (deltaX < 0) {
                    nextSlide();
                } else {
                    prevSlide();
                }
            }
        }, { passive: true });

        fetchSheetData();
        setInterval(fetchSheetData, 100000);
    </script>
</body>
</html>
