<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Konveksi Owlet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col justify-start items-center p-4 md:p-6 overflow-x-hidden relative">
    
    <div id="imageModal" class="fixed inset-0 z-[200] hidden bg-slate-950/95 backdrop-blur-md flex items-center justify-center p-4 overflow-hidden touch-none" onclick="closeZoom()">
        <img id="modalImg" src="" 
             class="max-w-full max-h-[90vh] object-contain rounded-lg shadow-2xl transition-transform duration-300 cursor-zoom-in relative" 
             onclick="toggleZoom(event)"
             onmousedown="startDrag(event)"
             onmousemove="onDrag(event)"
             onmouseup="endDrag()"
             onmouseleave="endDrag()"
             ontouchstart="startDrag(event)"
             ontouchmove="onDrag(event)"
             ontouchend="endDrag()">
        
        <div class="absolute top-5 right-5 flex flex-col gap-2 items-end pointer-events-none">
            <div class="text-slate-300 text-[10px] md:text-[11px] font-bold uppercase tracking-widest bg-slate-900/80 px-3 md:px-4 py-2 rounded-full border border-slate-700 backdrop-blur">
                🔍 Klik untuk Zoom 100% | Tahan & Geser
            </div>
            <div class="text-slate-400 text-[8px] md:text-[9px] font-bold uppercase tracking-widest bg-slate-900/80 px-3 md:px-4 py-1.5 rounded-full border border-slate-800 backdrop-blur">
                Klik area gelap untuk menutup
            </div>
        </div>
    </div>

    <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_right,rgba(20,184,166,0.04),transparent_50%)] pointer-events-none"></div>

    <header class="w-full max-w-7xl flex flex-col md:flex-row justify-between items-center gap-4 mb-6 relative z-50 bg-slate-900/40 border border-slate-900 p-4 rounded-2xl backdrop-blur-sm">
        <div class="flex items-center gap-3 shrink-0 w-full md:w-auto justify-center md:justify-start">
            <div class="w-10 h-10 rounded-full bg-teal-500/10 border border-slate-800 flex items-center justify-center text-lg">🦉</div>
            <div>
                <h1 class="text-xs font-bold tracking-tight text-slate-400">Model Konveksi Owlet</h1>
                <p class="text-[10px] text-emerald-400 flex items-center gap-1 justify-center md:justify-start">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span> LIVE
                </p>
            </div>
        </div>

        <div class="text-center md:flex-1 px-4" id="headerModelTitle">
            <span class="text-[9px] font-bold uppercase tracking-widest text-teal-400/70 block">Harap Tunggu</span>
            <h2 class="text-xl font-black tracking-tight text-white uppercase mt-0.5">- MEMUAT -</h2>
        </div>
        
        <div class="w-full md:w-72 relative z-50 shrink-0">
            <div class="relative">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500 text-sm">🔍</span>
                <input type="text" id="searchInput" oninput="searchModel(this.value)" placeholder="Cari nama model pakaian..." class="w-full bg-slate-950 border border-slate-800 rounded-xl pl-9 pr-4 py-2.5 md:py-2 text-xs text-slate-200 placeholder-slate-500 focus:outline-none focus:border-teal-500/50 transition">
            </div>
            <div id="searchDropdown" class="absolute left-0 right-0 mt-1 bg-slate-900 border border-slate-800 rounded-xl overflow-hidden shadow-2xl hidden z-50 max-h-60 overflow-y-auto divide-y divide-slate-800/60"></div>
        </div>
    </header>

    <div id="slideContainer" class="w-full max-w-7xl bg-slate-900 border border-slate-800/80 rounded-2xl shadow-2xl relative z-10 min-h-[400px] md:min-h-[500px] flex flex-col justify-center transition-all duration-300">
        <div class="text-center py-24 text-slate-400 text-sm flex flex-col items-center gap-3">
            <div class="w-6 h-6 border-2 border-teal-500 border-t-transparent rounded-full animate-spin"></div>
            Mendownload & mensinkronisasi data dari Google Sheets Cloud...
        </div>
    </div>

    <nav class="mt-6 flex items-center gap-4 z-30 bg-slate-900/90 backdrop-blur border border-slate-800/80 p-1.5 rounded-full shadow-2xl sticky bottom-4 transition-all duration-300">
        <button type="button" onclick="prevSlide()" aria-label="Model Sebelumnya" 
                class="w-10 h-10 md:w-9 md:h-9 flex items-center justify-center rounded-full border border-slate-800 bg-slate-950 text-slate-400 hover:text-teal-400 hover:border-teal-500/30 active:scale-90 transition-all duration-200 cursor-pointer focus:outline-none focus:ring-2 focus:ring-teal-500/40">
            <span class="text-base font-bold select-none">←</span>
        </button>
        
        <span class="text-[11px] font-bold text-slate-400 tracking-widest uppercase px-2 select-none" id="slideIndicator">
            Memuat...
        </span>
        
        <button type="button" onclick="nextSlide()" aria-label="Model Selanjutnya" 
                class="w-10 h-10 md:w-9 md:h-9 flex items-center justify-center rounded-full border border-slate-800 bg-slate-950 text-slate-400 hover:text-teal-400 hover:border-teal-500/30 active:scale-90 transition-all duration-200 cursor-pointer focus:outline-none focus:ring-2 focus:ring-teal-500/40">
            <span class="text-base font-bold select-none">→</span>
        </button>
    </nav>

    <script>
        const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1L24DsxwQ0uLxblnKzJ3YzH91gnsXuEhb8OVcRsH3WNo/export?format=csv&gid=0";

        let database = [];
        let highlightedIndex = -1;
        let currentSlideIndex = 0;
        const orderedCategories = ["OBRAS", "JAHIT", "KAM", "KARET", "BIS", "NECCI", "PACKING"];
        const DEFAULT_IMAGE = "https://images.unsplash.com/photo-1558769132-cb1aea458c5e?q=80&w=600&auto=format&fit=crop";

        // ==========================================
        // FUNGSI ZOOM, FULLSCREEN & DRAG (GESER)
        // ==========================================
        let isZoomed = false;
        let scaleValue = 1;
        let isDragging = false;
        let dragMoved = false; 
        let startX, startY, translateX = 0, translateY = 0;

        function updateTransform() {
            const modalImg = document.getElementById('modalImg');
            modalImg.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scaleValue})`;
        }

        window.openZoom = function(imgSrc) {
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImg');
            
            modalImg.src = imgSrc;
            isZoomed = false;
            scaleValue = 1;
            translateX = 0;
            translateY = 0;
            updateTransform();
            
            modalImg.className = "max-w-full max-h-[90vh] object-contain rounded-lg shadow-2xl transition-transform duration-300 cursor-zoom-in relative";
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.style.overflow = 'hidden'; 
        };

        window.closeZoom = function() {
            const modal = document.getElementById('imageModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.body.style.overflow = ''; 
        };

        window.toggleZoom = function(event) {
            event.stopPropagation(); 
            if (dragMoved) { dragMoved = false; return; }

            const modalImg = document.getElementById('modalImg');
            isZoomed = !isZoomed;

            if (isZoomed) {
                scaleValue = 2; // Zoom 100%
                modalImg.classList.remove('cursor-zoom-in');
                modalImg.classList.add('cursor-grab');
            } else {
                scaleValue = 1;
                translateX = 0;
                translateY = 0;
                modalImg.classList.remove('cursor-grab', 'cursor-grabbing');
                modalImg.classList.add('cursor-zoom-in');
            }
            updateTransform();
        };

        window.startDrag = function(event) {
            if (!isZoomed) return;
            if(event.cancelable) event.preventDefault(); 
            
            isDragging = true;
            dragMoved = false; 
            
            const clientX = event.touches ? event.touches[0].clientX : event.clientX;
            const clientY = event.touches ? event.touches[0].clientY : event.clientY;

            startX = clientX - translateX;
            startY = clientY - translateY;
            
            const modalImg = document.getElementById('modalImg');
            modalImg.classList.replace('cursor-grab', 'cursor-grabbing');
            modalImg.classList.remove('transition-transform', 'duration-300'); 
        };

        window.onDrag = function(event) {
            if (!isDragging || !isZoomed) return;
            dragMoved = true; 
            
            const clientX = event.touches ? event.touches[0].clientX : event.clientX;
            const clientY = event.touches ? event.touches[0].clientY : event.clientY;

            translateX = clientX - startX;
            translateY = clientY - startY;
            updateTransform();
        };

        window.endDrag = function() {
            if (!isDragging) return;
            isDragging = false;
            
            const modalImg = document.getElementById('modalImg');
            modalImg.classList.replace('cursor-grabbing', 'cursor-grab');
            modalImg.classList.add('transition-transform', 'duration-300'); 
        };
        // ==========================================

        function getCategoryStyle(cat) {
            const styles = {
                "OBRAS": "bg-amber-500/10 text-amber-400 border border-amber-500/20",
                "JAHIT": "bg-teal-500/10 text-teal-400 border border-teal-500/20",
                "KAM": "bg-sky-500/10 text-sky-400 border border-sky-500/20",
                "KARET": "bg-purple-500/10 text-purple-400 border border-purple-500/20",
                "BIS": "bg-pink-500/10 text-pink-400 border border-pink-500/20",
                "NECCI": "bg-emerald-500/10 text-emerald-400 border border-emerald-500/20",
                "PACKING": "bg-slate-400/10 text-slate-300 border border-slate-400/20"
            };
            return styles[cat] || "bg-slate-800 text-slate-400 border border-slate-700";
        }

        function konversiLinkDrive(url) {
    if (!url) return "";
    if (url.includes("drive.google.com")) {
        const match = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
        if (match && match[1]) {
            return `https://lh3.googleusercontent.com/d/${match[1]}`; 
        }
    }
    return url;
}

        function parseCSVToJSON(csvText) {
            const lines = csvText.split(/\r?\n/);
            const modelsMap = {};
            const firstLine = lines[0] || "";
            const delimiter = firstLine.includes(";") ? ";" : ",";

            for (let i = 1; i < lines.length; i++) {
                let line = lines[i].trim();
                if (!line) continue;
                
                let columns = [];
                let inQuotes = false;
                let currentColumn = "";

                for (let j = 0; j < line.length; j++) {
                    let char = line[j];
                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === delimiter && !inQuotes) {
                        columns.push(currentColumn.trim());
                        currentColumn = "";
                    } else {
                        currentColumn += char;
                    }
                }
                columns.push(currentColumn.trim());

                if (columns.length < 4) continue;

                const modelName = columns[0].replace(/^"|"$/g, '').trim();
                const category = columns[1].replace(/^"|"$/g, '').trim().toUpperCase();
                const details = columns[2].replace(/^"|"$/g, '').trim();
                const price = parseInt(columns[3].replace(/[^0-9]/g, '')) || 0;
                let imageUrl = (columns[4] && columns[4].trim()) ? columns[4].replace(/^"|"$/g, '').trim() : "";

                if (!modelName) continue;

                if (!modelsMap[modelName]) {
                    modelsMap[modelName] = { name: modelName, items: [], image: "" };
                }
                
                modelsMap[modelName].items.push({ category, details, price });
                
                if (imageUrl && !modelsMap[modelName].image) {
                    modelsMap[modelName].image = konversiLinkDrive(imageUrl);
                }
            }
            return Object.values(modelsMap);
        }

        async function fetchSheetData() {
            try {
                const response = await fetch(GOOGLE_SHEET_CSV_URL + "&cache_buster=" + Date.now());
                if (!response.ok) throw new Error("Gagal mengambil data (Status: " + response.status + ")");
                
                const csvText = await response.text();
                if (!csvText.trim() || csvText.includes("<!DOCTYPE html>")) {
                    throw new Error("Akses ditolak atau dokumen belum di-Publish ke Web.");
                }

                const oldModelName = database[currentSlideIndex]?.name;
                database = parseCSVToJSON(csvText);

                if (database.length > 0) {
                    if (oldModelName) {
                        const newIndex = database.findIndex(m => m.name === oldModelName);
                        if (newIndex !== -1) currentSlideIndex = newIndex;
                    }
                    renderSlide();
                } else {
                    document.getElementById('slideContainer').innerHTML = '<div class="text-center py-24 text-amber-400 text-xs">⚠️ Tabel data kosong atau format kolom salah.</div>';
                }
            } catch (error) {
                console.error(error);
                document.getElementById('slideContainer').innerHTML = `
                    <div class="text-center py-20 text-red-400 text-xs flex flex-col items-center gap-2">
                        <span class="text-lg">❌ Koneksi Cloud Tertahan</span>
                        <span class="text-[11px] text-slate-500 max-w-md mt-1">${error.message}</span>
                        <button onclick="fetchSheetData()" class="mt-5 bg-slate-800 text-slate-300 border border-slate-700 px-4 py-1.5 rounded-xl text-[10px] hover:bg-slate-700 transition">Coba Hubungkan Ulang</button>
                    </div>
                `;
            }
        }

        function renderSlide() {
            const container = document.getElementById('slideContainer');
            if (database.length === 0) return;

            if (currentSlideIndex >= database.length) currentSlideIndex = database.length - 1;
            const model = database[currentSlideIndex];
            const totalHpp = model.items.reduce((sum, item) => sum + item.price, 0);

            document.getElementById('headerModelTitle').innerHTML = `
                <span class="text-[9px] font-bold uppercase tracking-widest text-teal-400 block">Nama Model</span>
                <h2 class="text-xl md:text-2xl font-black tracking-tight text-white uppercase mt-0.5">${model.name}</h2>
            `;

            const currentImg = model.image ? model.image : DEFAULT_IMAGE;

            let rowsHtml = '';
            orderedCategories.forEach(cat => {
                const catItems = model.items.filter(item => item.category === cat);
                if (catItems.length > 0) {
                    let catTotal = 0;
                    catItems.forEach(item => {
                        catTotal += item.price;
                        rowsHtml += `
                            <tr class="border-b border-slate-800/30 hover:bg-slate-800/10 transition">
                                <td class="py-2.5 md:py-2 px-2 md:px-3 whitespace-nowrap"><span class="text-[9px] font-bold tracking-wider px-2 py-0.5 rounded ${getCategoryStyle(item.category)}">${item.category}</span></td>
                                <td class="py-2.5 md:py-2 px-2 md:px-3 text-xs text-slate-300 min-w-[120px]">${item.details}</td>
                                <td class="py-2.5 md:py-2 px-2 md:px-3 text-right font-mono text-slate-300 text-xs whitespace-nowrap">Rp ${item.price.toLocaleString('id-ID')}</td>
                            </tr>
                        `;
                    });
                    rowsHtml += `
                        <tr class="bg-slate-900/30 border-b border-slate-800/80 font-medium text-slate-400 text-[11px]">
                            <td colspan="2" class="py-2 md:py-1.5 px-3 italic text-right">Subtotal ${cat} :</td>
                            <td class="py-2 md:py-1.5 px-3 text-right font-mono text-teal-500/80 font-bold whitespace-nowrap">Rp ${catTotal.toLocaleString('id-ID')}</td>
                        </tr>
                    `;
                }
            });

            container.innerHTML = `
                <div class="w-full flex flex-col md:flex-row gap-4 md:gap-6 p-4 md:p-6">
                    
                    <div class="w-full h-56 md:w-2/5 md:h-[450px] bg-slate-950/50 border border-slate-800 rounded-xl overflow-hidden flex items-center justify-center p-2 shrink-0 relative">
                        <span class="absolute top-2 right-2 md:hidden bg-slate-900/80 text-slate-400 text-[9px] px-2 py-1 rounded-full border border-slate-700 backdrop-blur z-10">🔍 Tap Zoom</span>
                        <img src="${currentImg}" alt="Foto" onclick="openZoom('${currentImg}')" class="w-full h-full object-contain cursor-zoom-in hover:scale-105 transition duration-500" onerror="this.src='${DEFAULT_IMAGE}'">
                    </div>

                    <div class="w-full md:w-3/5 flex flex-col gap-3 overflow-hidden">
                        <h3 class="text-sm font-bold text-slate-200 uppercase tracking-widest shrink-0 text-center md:text-left mt-2 md:mt-0">List Harga Kerjaan</h3>
                        
                        <div class="flex-1 bg-slate-950/50 border border-slate-800 rounded-xl overflow-y-auto overflow-x-auto min-h-[250px] max-h-[350px] md:max-h-[380px]">
                            <table class="w-full text-left border-collapse min-w-[320px]">
                                <thead class="bg-slate-900/95 sticky top-0 z-10 backdrop-blur-sm">
                                    <tr class="text-[9px] text-slate-400 uppercase border-b border-slate-800">
                                        <th class="py-2 px-2 md:px-3 whitespace-nowrap">Kategori</th>
                                        <th class="py-2 px-2 md:px-3">Detail</th>
                                        <th class="py-2 px-2 md:px-3 text-right whitespace-nowrap">Harga</th>
                                    </tr>
                                </thead>
                                <tbody>${rowsHtml}</tbody>
                            </table>
                        </div>

                        <div class="bg-teal-900/20 border border-teal-500/20 p-3 md:p-4 rounded-xl flex justify-between items-center shrink-0 mt-auto">
                            <span class="text-[10px] font-black uppercase text-teal-400">Total Keseluruhan</span>
                            <span class="text-base md:text-lg font-black text-teal-400 font-mono">Rp ${totalHpp.toLocaleString('id-ID')}</span>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('slideIndicator').innerText = `Model ${currentSlideIndex + 1} dari ${database.length}`;
        }

        window.searchModel = function(query) {
            const dropdown = document.getElementById('searchDropdown');
            highlightedIndex = -1; 
            
            if (!query.trim()) { dropdown.classList.add('hidden'); return; }

            const results = database.filter(m => m.name.toLowerCase().includes(query.toLowerCase()));
            dropdown.innerHTML = '';
            
            if (results.length === 0) {
                dropdown.innerHTML = '<div class="p-3 text-xs text-slate-500 italic text-center">Tidak ditemukan</div>';
            } else {
                results.forEach((model, index) => {
                    const div = document.createElement('div');
                    div.className = "search-item p-3 text-xs text-slate-300 hover:bg-slate-800 cursor-pointer transition flex justify-between items-center";
                    div.innerHTML = `<span class="font-bold uppercase">${model.name}</span>`;
                    div.onclick = () => selectModel(model);
                    dropdown.appendChild(div);
                });
            }
            dropdown.classList.remove('hidden');
        }

        function selectModel(model) {
            currentSlideIndex = database.findIndex(m => m.name === model.name);
            document.getElementById('searchDropdown').classList.add('hidden');
            document.getElementById('searchInput').value = '';
            renderSlide();
        }

        document.getElementById('searchInput').addEventListener('keydown', function(e) {
            const items = document.querySelectorAll('.search-item');
            if (items.length === 0) return;

            if (e.key === 'ArrowDown') {
                e.preventDefault();
                highlightedIndex = (highlightedIndex + 1) % items.length;
                updateHighlight(items);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                highlightedIndex = (highlightedIndex - 1 + items.length) % items.length;
                updateHighlight(items);
            } else if (e.key === 'Enter') {
                e.preventDefault();
                if (highlightedIndex >= 0) items[highlightedIndex].click();
            }
        });

        function updateHighlight(items) {
            items.forEach((item, idx) => {
                item.classList.toggle('bg-slate-800', idx === highlightedIndex);
                if (idx === highlightedIndex) item.scrollIntoView({ block: 'nearest' });
            });
        }

        document.addEventListener('keydown', function(event) {
            if (document.activeElement === document.getElementById('searchInput')) return; 
            if (event.key === 'ArrowRight') nextSlide();
            else if (event.key === 'ArrowLeft') prevSlide();
        });

        window.nextSlide = function() { if (currentSlideIndex < database.length - 1) { currentSlideIndex++; renderSlide(); } }
        window.prevSlide = function() { if (currentSlideIndex > 0) { currentSlideIndex--; renderSlide(); } }

        document.addEventListener('click', e => { if (!e.target.closest('#searchInput')) document.getElementById('searchDropdown').classList.add('hidden'); });

        // ==========================================
        // LOGIKA SWIPE UNTUK HP
        // ==========================================
        let touchStartX = 0;
        let touchStartY = 0;

        document.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, { passive: true });

        document.addEventListener('touchend', e => {
            // Jangan deteksi swipe jika: modal foto terbuka, target adalah tabel (agar bisa geser tabel), atau target adalah input pencarian
            if (!document.getElementById('imageModal').classList.contains('hidden')) return;
            if (e.target.closest('table') || e.target.closest('.overflow-x-auto')) return;
            if (e.target.closest('input')) return; 

            const touchEndX = e.changedTouches[0].screenX;
            const touchEndY = e.changedTouches[0].screenY;
            
            const deltaX = touchEndX - touchStartX;
            const deltaY = touchEndY - touchStartY;

            // Pastikan pergerakan mendatar (horizontal) lebih besar dibanding vertikal dan jaraknya cukup (50px)
            if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > 50) {
                if (deltaX < 0) {
                    nextSlide(); // Geser layar ke kiri -> Model Selanjutnya
                } else {
                    prevSlide(); // Geser layar ke kanan -> Model Sebelumnya
                }
            }
        }, { passive: true });

        fetchSheetData();
        setInterval(fetchSheetData, 30000);
    </script>
</body>
</html>
