<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owlet Kids - Harga CMT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Menggunakan font bulat dan lucu (Fredoka & Nunito) -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; }
        .font-cute { font-family: 'Fredoka', sans-serif; }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(224, 231, 255, 0.5); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #a5b4fc; border-radius: 10px; border: 2px solid transparent; background-clip: padding-box; }
        ::-webkit-scrollbar-thumb:hover { background: #818cf8; border: 2px solid transparent; background-clip: padding-box; }

        .slide-content {
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1), transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 1; transform: translateY(0) scale(1);
        }
        .slide-hidden { opacity: 0; transform: translateY(20px) scale(0.95); }
        .toast-enter { transform: translateY(100%); opacity: 0; }
        .toast-show { transform: translateY(0); opacity: 1; }

        /* Animasi Awan & Bintang Melayang */
        @keyframes floatSlow {
            0% { transform: translateY(0px) translateX(0px); }
            50% { transform: translateY(-15px) translateX(15px); }
            100% { transform: translateY(0px) translateX(0px); }
        }
        @keyframes floatFast {
            0% { transform: translateY(0px) translateX(0px) rotate(0deg); }
            50% { transform: translateY(-10px) translateX(-10px) rotate(5deg); }
            100% { transform: translateY(0px) translateX(0px) rotate(0deg); }
        }
        .animate-float-slow { animation: floatSlow 8s ease-in-out infinite; }
        .animate-float-fast { animation: floatFast 5s ease-in-out infinite; }

        /* Efek Tombol 3D Mainan */
        .btn-3d {
            transition: all 0.1s;
        }
        .btn-3d:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 transparent !important;
        }
    </style>
</head>
<!-- Background gradasi malam cerah / twilight pastel -->
<body class="bg-gradient-to-br from-indigo-300 via-purple-300 to-blue-200 text-indigo-950 min-h-screen flex flex-col justify-start items-center p-4 md:p-6 overflow-x-hidden relative selection:bg-pink-300 selection:text-pink-900">
    
    <!-- Dekorasi Background Malam Terang (Awan, Bintang, Bulan) Lebih Banyak -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden z-0">
        <div class="absolute top-8 right-8 text-7xl drop-shadow-[0_0_30px_rgba(253,224,71,1)] animate-pulse">🌕</div>
        <div class="absolute top-16 left-12 text-3xl animate-ping" style="animation-duration: 3s">✨</div>
        <div class="absolute top-48 right-32 text-2xl animate-pulse" style="animation-duration: 2s">⭐</div>
        <div class="absolute bottom-32 left-8 text-4xl animate-float-fast drop-shadow-md">🌟</div>
        <div class="absolute top-20 left-[-20px] text-8xl opacity-80 animate-float-slow drop-shadow-lg">☁️</div>
        <div class="absolute top-1/4 right-[-30px] text-7xl opacity-90 animate-float-slow" style="animation-delay: 2s;">☁️</div>
        <div class="absolute bottom-20 right-10 text-6xl opacity-70 animate-float-fast drop-shadow-lg">☁️</div>
        
        <!-- Tambahan Bintang dan Awan -->
        <div class="absolute top-10 left-1/3 text-2xl animate-pulse" style="animation-duration: 1.5s">⭐</div>
        <div class="absolute top-1/2 left-10 text-3xl animate-ping" style="animation-duration: 4s">✨</div>
        <div class="absolute bottom-1/4 right-1/4 text-2xl animate-float-slow">⭐</div>
        <div class="absolute top-1/3 left-1/4 text-6xl opacity-60 animate-float-fast" style="animation-delay: 1s;">☁️</div>
        <div class="absolute bottom-10 left-1/3 text-5xl opacity-80 animate-float-slow" style="animation-delay: 3s;">☁️</div>
        <div class="absolute top-5 right-1/3 text-4xl opacity-70 animate-float-fast" style="animation-delay: 0.5s;">☁️</div>
    </div>

    <!-- Toast Notifikasi -->
    <div id="toastContainer" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[300] flex flex-col gap-2 pointer-events-none"></div>

    <!-- Modal Zoom -->
    <div id="imageModal" class="fixed inset-0 z-[200] hidden bg-indigo-950/90 backdrop-blur-sm flex items-center justify-center p-4 overflow-hidden touch-none" onclick="closeZoom()">
        <img id="modalImg" src="" 
             class="max-w-full max-h-[90vh] object-contain rounded-3xl shadow-[0_0_50px_rgba(255,255,255,0.3)] border-4 border-white transition-transform duration-300 cursor-zoom-in relative bg-white" 
             onclick="toggleZoom(event)" onmousedown="startDrag(event)" onmousemove="onDrag(event)" onmouseup="endDrag()" onmouseleave="endDrag()"
             ontouchstart="startDrag(event)" ontouchmove="onDrag(event)" ontouchend="endDrag()">
        
        <div class="absolute top-5 right-5 flex flex-col gap-2 items-end pointer-events-none">
            <div class="text-indigo-900 text-[11px] font-cute font-bold tracking-widest bg-yellow-300 px-4 py-2 rounded-full border-2 border-yellow-500 shadow-[0_4px_0_#ca8a04]">
                🔍 Klik untuk Zoom | Tahan & Geser
            </div>
        </div>
    </div>

    <!-- Header -->
    <header class="w-full max-w-7xl flex flex-col md:flex-row justify-between items-center gap-4 mb-6 relative z-50 bg-white/85 border-4 border-white p-4 rounded-[2rem] backdrop-blur-lg shadow-[0_10px_30px_rgba(49,46,129,0.15)]">
        <div class="flex items-center gap-3 shrink-0 w-full md:w-auto justify-center md:justify-start">
            <div class="w-14 h-14 rounded-full bg-gradient-to-br from-pink-300 to-purple-300 border-4 border-white flex items-center justify-center text-3xl shadow-lg animate-bounce" style="animation-duration: 2s;">🦉</div>
            <div>
                <h1 class="text-xl font-cute font-bold tracking-tight text-indigo-900 drop-shadow-sm">Owlet Kids</h1>
                <p id="syncStatus" class="text-xs font-cute text-emerald-600 font-bold flex items-center gap-1.5 justify-center md:justify-start transition-colors mt-0.5 bg-emerald-100 px-2 py-0.5 rounded-full border border-emerald-200 inline-flex">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> ONLINE
                </p>
            </div>
        </div>

        <div class="text-center md:flex-1 px-4" id="headerModelTitle">
            <span class="text-xs font-bold uppercase tracking-widest text-pink-500 block">Tunggu Sebentar...</span>
            <h2 class="text-[26px] md:text-[32px] font-cute font-black text-indigo-900 mt-0.5">- MEMUAT -</h2>
        </div>
        
        <div class="w-full md:w-80 relative z-50 shrink-0 flex gap-2">
            <div class="relative w-full group">
                <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-indigo-400 text-lg">🔍</span>
                <input type="text" id="searchInput" oninput="searchModel(this.value)" placeholder="Cari model baju..." class="w-full bg-indigo-50 border-2 border-indigo-200 rounded-2xl pl-10 pr-4 py-3 text-sm font-bold text-indigo-900 placeholder-indigo-300 focus:outline-none focus:border-yellow-400 focus:ring-4 focus:ring-yellow-200/50 transition-all shadow-inner">
            </div>
            <button onclick="manualRefresh()" aria-label="Refresh Data" class="btn-3d w-12 h-12 md:h-auto shrink-0 flex items-center justify-center bg-yellow-300 border-2 border-yellow-400 rounded-2xl text-yellow-800 hover:bg-yellow-400 shadow-[0_4px_0_#ca8a04] transition-all text-xl" title="Sinkronisasi Ulang">
                🔄
            </button>
            <div id="searchDropdown" class="absolute left-0 right-14 mt-14 bg-white border-2 border-indigo-100 rounded-2xl overflow-hidden shadow-[0_15px_40px_rgba(49,46,129,0.2)] hidden z-50 max-h-60 overflow-y-auto divide-y divide-indigo-50 font-cute"></div>
        </div>
    </header>

    <!-- Kontainer Utama -->
    <div id="slideWrapper" class="w-full max-w-7xl bg-white/90 backdrop-blur-lg border-4 border-white rounded-[2.5rem] shadow-[0_15px_40px_rgba(49,46,129,0.15)] relative z-10 min-h-[400px] md:min-h-[500px] flex flex-col justify-center overflow-hidden">
        <div id="slideContainer" class="slide-content w-full h-full transition-all duration-300">
            <!-- Loading Skeleton -->
            <div class="w-full h-full flex flex-col md:flex-row gap-6 p-6 animate-pulse">
                <div class="w-full md:w-2/5 h-64 md:h-[450px] bg-indigo-100 rounded-[2rem]"></div>
                <div class="w-full md:w-3/5 flex flex-col gap-4">
                    <div class="h-8 w-1/3 bg-indigo-100 rounded-xl"></div>
                    <div class="flex-1 bg-indigo-50 rounded-[2rem] min-h-[200px]"></div>
                    <div class="h-24 bg-indigo-100 rounded-[2rem]"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Navigasi Bawah -->
    <nav class="mt-8 flex items-center gap-5 z-30 bg-white/90 backdrop-blur-lg border-4 border-white p-2 rounded-full shadow-[0_10px_20px_rgba(49,46,129,0.15)] sticky bottom-4">
        <button type="button" onclick="changeSlide('prev')" class="btn-3d w-14 h-14 md:w-12 md:h-12 flex items-center justify-center rounded-full border-2 border-indigo-200 bg-indigo-50 text-indigo-600 hover:bg-indigo-100 shadow-[0_4px_0_#c7d2fe] transition-all">
            <span class="text-2xl font-bold select-none">👈</span>
        </button>
        
        <span class="text-sm font-cute font-bold text-indigo-500 tracking-wider px-2 select-none flex items-center gap-2" id="slideIndicator">
            Memuat...
        </span>
        
        <button type="button" onclick="changeSlide('next')" class="btn-3d w-14 h-14 md:w-12 md:h-12 flex items-center justify-center rounded-full border-2 border-indigo-200 bg-indigo-50 text-indigo-600 hover:bg-indigo-100 shadow-[0_4px_0_#c7d2fe] transition-all">
            <span class="text-2xl font-bold select-none">👉</span>
        </button>
    </nav>

   <script>
    const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1L24DsxwQ0uLxblnKzJ3YzH91gnsXuEhb8OVcRsH3WNo/edit?gid=0#gid=0";

    let database = [], highlightedIndex = -1, currentSlideIndex = 0, currentTotalHPP = 0;
    const orderedCategories = ["OBRAS", "JAHIT", "KAM", "KARET", "BIS", "NECCI", "PACKING"];
    const DEFAULT_IMAGE = "https://images.unsplash.com/photo-1519689680058-324335c77eba?q=80&w=600&auto=format&fit=crop"; 

    window.showToast = function(message, type = "success") {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        const icon = type === "success" ? "✨" : (type === "sync" ? "🔄" : "⚠️");
        const bgColor = type === "success" ? "bg-pink-400 border-pink-500" : (type === "sync" ? "bg-blue-400 border-blue-500" : "bg-red-400 border-red-500");
        
        toast.className = `flex items-center gap-2 px-5 py-3 rounded-full border-2 ${bgColor} text-white font-cute text-sm font-bold shadow-xl backdrop-blur-md toast-enter transition-all duration-300`;
        toast.innerHTML = `<span class="text-lg">${icon}</span> <span>${message}</span>`;
        
        container.appendChild(toast);
        setTimeout(() => { toast.classList.remove('toast-enter'); toast.classList.add('toast-show'); }, 10);
        setTimeout(() => { toast.classList.remove('toast-show'); toast.classList.add('toast-enter'); setTimeout(() => toast.remove(), 300); }, 3000);
    };

    let isZoomed = false, scaleValue = 1, isDragging = false, dragMoved = false; 
    let startX, startY, translateX = 0, translateY = 0;

    function updateTransform() { document.getElementById('modalImg').style.transform = `translate(${translateX}px, ${translateY}px) scale(${scaleValue})`; }

    window.openZoom = function(imgSrc) {
        const modal = document.getElementById('imageModal'), modalImg = document.getElementById('modalImg');
        modalImg.src = imgSrc; isZoomed = false; scaleValue = 1; translateX = 0; translateY = 0; updateTransform();
        modalImg.className = "max-w-full max-h-[90vh] object-contain rounded-[2rem] shadow-[0_0_40px_rgba(255,255,255,0.5)] border-4 border-white transition-transform duration-300 cursor-zoom-in relative bg-white";
        modal.classList.remove('hidden'); modal.classList.add('flex'); document.body.style.overflow = 'hidden'; 
    };

    window.closeZoom = function() {
        const modal = document.getElementById('imageModal');
        modal.classList.add('hidden'); modal.classList.remove('flex'); document.body.style.overflow = ''; 
    };

    window.toggleZoom = function(event) {
        event.stopPropagation(); if (dragMoved) { dragMoved = false; return; }
        isZoomed = !isZoomed;
        const modalImg = document.getElementById('modalImg');
        if (isZoomed) { scaleValue = 2; modalImg.classList.replace('cursor-zoom-in', 'cursor-grab'); } 
        else { scaleValue = 1; translateX = 0; translateY = 0; modalImg.classList.remove('cursor-grab', 'cursor-grabbing'); modalImg.classList.add('cursor-zoom-in'); }
        updateTransform();
    };
    
    window.startDrag = function(event) {
        if (!isZoomed) return; if(event.cancelable) event.preventDefault(); 
        isDragging = true; dragMoved = false; 
        const clientX = event.touches ? event.touches[0].clientX : event.clientX;
        const clientY = event.touches ? event.touches[0].clientY : event.clientY;
        startX = clientX - translateX; startY = clientY - translateY; 
        document.getElementById('modalImg').classList.replace('cursor-grab', 'cursor-grabbing');
        document.getElementById('modalImg').classList.remove('transition-transform', 'duration-300'); 
    };

    window.onDrag = function(event) {
        if (!isDragging || !isZoomed) return; dragMoved = true; 
        const clientX = event.touches ? event.touches[0].clientX : event.clientX;
        const clientY = event.touches ? event.touches[0].clientY : event.clientY;
        translateX = clientX - startX; translateY = clientY - startY; updateTransform();
    };

    window.endDrag = function() {
        if (!isDragging) return; isDragging = false;
        const modalImg = document.getElementById('modalImg');
        modalImg.classList.replace('cursor-grabbing', 'cursor-grab'); modalImg.classList.add('transition-transform', 'duration-300'); 
    };

    function getCategoryStyle(cat) {
        const styles = { 
            "OBRAS": "bg-orange-100 text-orange-700 border-orange-300", 
            "JAHIT": "bg-blue-100 text-blue-700 border-blue-300", 
            "KAM": "bg-pink-100 text-pink-700 border-pink-300", 
            "KARET": "bg-purple-100 text-purple-700 border-purple-300", 
            "BIS": "bg-yellow-100 text-yellow-700 border-yellow-400", 
            "NECCI": "bg-emerald-100 text-emerald-700 border-emerald-300", 
            "PACKING": "bg-indigo-100 text-indigo-700 border-indigo-300" 
        };
        return styles[cat] ? `border-2 ${styles[cat]}` : "bg-gray-100 text-gray-700 border-2 border-gray-300";
    }

    function konversiLinkDrive(url) {
        if (!url) return "";
        if (url.includes("drive.google.com")) {
            let match = url.match(/\/d\/([a-zA-Z0-9-_]+)/) || url.match(/id=([a-zA-Z0-9-_]+)/);
            if (match && match[1]) {
                return `https://lh3.googleusercontent.com/d/${match[1]}`;
            }
        }
        return url; 
    }

    function parseCSVToJSON(csvText) {
        const lines = csvText.split(/\r?\n/); const modelsMap = {};
        const delimiter = (lines[0] || "").includes(";") ? ";" : ",";

        for (let i = 1; i < lines.length; i++) {
            let line = lines[i].trim(); if (!line) continue;
            let columns = [], inQuotes = false, currentColumn = "";
            for (let j = 0; j < line.length; j++) {
                let char = line[j];
                if (char === '"') inQuotes = !inQuotes;
                else if (char === delimiter && !inQuotes) { columns.push(currentColumn.trim()); currentColumn = ""; }
                else currentColumn += char;
            }
            columns.push(currentColumn.trim());
            if (columns.length < 4) continue;

            const modelName = columns[0].replace(/^"|"$/g, '').trim();
            const category = columns[1].replace(/^"|"$/g, '').trim().toUpperCase();
            const details = columns[2].replace(/^"|"$/g, '').trim();
            const price = parseInt(columns[3].replace(/[^0-9]/g, '')) || 0;
            
            let rawImageUrl = (columns[4] && columns[4].trim()) ? columns[4].replace(/^"|"$/g, '').trim() : "";
            let hargaJual = parseInt((columns[5] || "").replace(/[^0-9]/g, '')) || 0;

            if (!modelName) continue;
            
            if (!modelsMap[modelName]) {
                modelsMap[modelName] = { 
                    name: modelName, 
                    items: [], 
                    image: konversiLinkDrive(rawImageUrl), 
                    hargaJual: hargaJual 
                };
            } else {
                if (modelsMap[modelName].hargaJual === 0 && hargaJual > 0) {
                    modelsMap[modelName].hargaJual = hargaJual;
                }
                if (!modelsMap[modelName].image && rawImageUrl) {
                    modelsMap[modelName].image = konversiLinkDrive(rawImageUrl);
                }
            }
            
            modelsMap[modelName].items.push({ category, details, price });
        }
        return Object.values(modelsMap);
    }

    async function fetchSheetData(isManual = false) {
        const syncStatus = document.getElementById('syncStatus');
        syncStatus.innerHTML = `TUNGGU YA...`;
        syncStatus.className = "text-xs font-cute text-amber-700 font-bold bg-amber-200 px-3 py-1 rounded-full border-2 border-amber-400 mt-1 inline-block animate-pulse";

        try {
            let csvFetchUrl = GOOGLE_SHEET_CSV_URL;
            if (csvFetchUrl.includes("/edit")) {
                csvFetchUrl = csvFetchUrl.replace(/\/edit.*/, "/export?format=csv");
            }

            const response = await fetch(csvFetchUrl + "&cache_buster=" + Date.now());
            if (!response.ok) throw new Error("Gagal mengambil data");
            const csvText = await response.text();
            if (!csvText.trim() || csvText.includes("<!DOCTYPE html>")) throw new Error("Akses ditolak");

            const oldModelName = database[currentSlideIndex]?.name;
            database = parseCSVToJSON(csvText);

            if (database.length > 0) {
                if (oldModelName) {
                    const newIndex = database.findIndex(m => m.name === oldModelName);
                    if (newIndex !== -1) currentSlideIndex = newIndex;
                }
                if(isManual) {
                    changeSlide('none');
                    showToast("Yay! Data terupdate!", "success");
                } else renderSlide(false); 
            } else {
                document.getElementById('slideContainer').innerHTML = '<div class="text-center py-24 font-cute text-pink-500 text-lg font-bold">Ups! Tabel data kosong 🥺</div>';
            }
            
            syncStatus.innerHTML = `<span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> ONLINE`;
            syncStatus.className = "text-xs font-cute text-emerald-700 font-bold flex items-center gap-1.5 justify-center md:justify-start transition-colors mt-0.5 bg-emerald-100 px-3 py-1 rounded-full border-2 border-emerald-300 inline-flex shadow-sm";
        } catch (error) {
            console.error(error);
            syncStatus.innerHTML = `YAHH OFFLINE 😢`;
            syncStatus.className = "text-xs font-cute text-red-700 font-bold flex items-center gap-1.5 justify-center md:justify-start transition-colors mt-0.5 bg-red-100 px-3 py-1 rounded-full border-2 border-red-300 inline-flex shadow-sm";
            if(isManual) showToast("Yahh gagal sinkron.", "error");
        }
    }

    window.manualRefresh = function() { fetchSheetData(true); };

    function generateTextSummary() {
        if (database.length === 0) return "";
        const model = database[currentSlideIndex];
        
        let text = `*✨ RINCIAN HARGA PRODUKSI ✨*\n`;
        text += `=========================\n`;
        text += `*Nama Model:* _${model.name.toUpperCase()}_\n`;
        text += `=========================\n\n`;

        orderedCategories.forEach(cat => {
            const catItems = model.items.filter(item => item.category === cat);
            if (catItems.length > 0) {
                text += `*🏷️ ${cat}*\n`;
                let catTotal = 0;
                catItems.forEach(item => {
                    catTotal += item.price;
                    text += `  • ${item.details} = Rp ${item.price.toLocaleString('id-ID')}\n`;
                });
                text += `  *Subtotal:* Rp ${catTotal.toLocaleString('id-ID')}\n\n`;
            }
        });
        text += `=========================\n`;
        text += `*💖 TOTAL PRODUKSI : Rp ${currentTotalHPP.toLocaleString('id-ID')}*\n`;
        
        if (model.hargaJual > 0) {
            text += `*🎀 HARGA CMT : Rp ${model.hargaJual.toLocaleString('id-ID')}*\n`;
        }
        
        text += `=========================\n`;
        text += `_Dikirim via Aplikasi Owlet Kids_ 🦉`;
        
        return text;
    }

    window.sendToWhatsApp = function() {
        const text = generateTextSummary();
        if(text) window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`, '_blank');
    };

    window.copyDataToClipboard = function() {
        const text = generateTextSummary();
        if(!text) return;
        navigator.clipboard.writeText(text).then(() => { showToast("Rincian disalin! ✨", "success"); })
        .catch(err => { showToast("Gagal menyalin 😢", "error"); });
    };

    window.changeSlide = function(direction) {
        if (database.length === 0) return;
        if (direction === 'next' && currentSlideIndex < database.length - 1) currentSlideIndex++;
        else if (direction === 'prev' && currentSlideIndex > 0) currentSlideIndex--;
        else if (direction === 'none') { /* Just Re-render */ }
        else return; 

        const container = document.getElementById('slideContainer');
        container.classList.add('slide-hidden');
        setTimeout(() => { renderSlide(); container.classList.remove('slide-hidden'); }, 400); 
    };

    function renderSlide() {
        const container = document.getElementById('slideContainer');
        if (database.length === 0) return;
        if (currentSlideIndex >= database.length) currentSlideIndex = database.length - 1;
        
        const model = database[currentSlideIndex];
        currentTotalHPP = model.items.reduce((sum, item) => sum + item.price, 0);

        document.getElementById('headerModelTitle').innerHTML = `
            <span class="text-[10px] font-bold uppercase tracking-widest text-indigo-400 block mb-1">🎀 Nama Model</span>
            <h2 class="text-[26px] md:text-[32px] font-cute font-bold text-indigo-900 drop-shadow-sm">${model.name}</h2>
        `;

        const currentImg = model.image ? model.image : DEFAULT_IMAGE;
        let rowsHtml = '';
        
        orderedCategories.forEach(cat => {
            const catItems = model.items.filter(item => item.category === cat);
            if (catItems.length > 0) {
                let catTotal = 0;
                catItems.forEach(item => {
                    catTotal += item.price;
                    rowsHtml += `
                        <tr class="border-b-2 border-indigo-50 hover:bg-indigo-50/50 transition-colors bg-white">
                            <td class="py-2.5 px-2 md:px-3 whitespace-nowrap"><span class="text-[9px] md:text-[10px] font-cute font-bold tracking-wider px-2 py-1 rounded-xl shadow-sm ${getCategoryStyle(item.category)}">${item.category}</span></td>
                            <td class="py-2.5 px-2 md:px-3 text-xs md:text-sm text-indigo-800 font-bold leading-snug break-words">${item.details}</td>
                            <td class="py-2.5 px-2 md:px-3 text-right font-cute font-bold text-indigo-900 text-xs md:text-sm whitespace-nowrap">Rp ${item.price.toLocaleString('id-ID')}</td>
                        </tr>
                    `;
                });
                // Update text subtotal agar ukurannya lebih besar
                rowsHtml += `
                    <tr class="bg-indigo-50/80 border-b-2 border-indigo-100 font-bold text-indigo-800">
                        <td colspan="2" class="py-2.5 px-2 md:px-3 text-right text-sm">Subtotal ${cat} :</td>
                        <td class="py-2.5 px-2 md:px-3 text-right font-cute text-pink-600 font-bold whitespace-nowrap text-base">Rp ${catTotal.toLocaleString('id-ID')}</td>
                    </tr>
                `;
            }
        });

        const textHargaJual = model.hargaJual > 0 ? `Rp ${model.hargaJual.toLocaleString('id-ID')}` : "Belum Set";
        const profitKotor = model.hargaJual - currentTotalHPP;
        let profitHtml = '';
        
        if (model.hargaJual > 0) {
            const profitColor = profitKotor > 0 ? 'text-emerald-700 bg-emerald-100 border-emerald-300' : (profitKotor === 0 ? 'text-gray-700 bg-gray-100 border-gray-300' : 'text-red-700 bg-red-100 border-red-300');
            profitHtml = `
                <div class="mt-4 flex flex-col items-center justify-center gap-1">
                    <span class="uppercase tracking-widest font-bold text-xs text-yellow-900/70">💖 Selisih</span>
                    <span class="${profitColor} text-lg md:text-xl font-cute font-bold px-4 py-1.5 rounded-full border-2 shadow-sm">Rp ${profitKotor.toLocaleString('id-ID')}</span>
                </div>
            `;
        } else {
            profitHtml = `<div class="text-xs text-yellow-800/60 mt-3 font-bold bg-yellow-100 px-3 py-1 rounded-full inline-block">Harga belum di set 🥺</div>`;
        }

        // overflow-x-hidden mematikan geseran di HP
        container.innerHTML = `
            <div class="w-full h-full flex flex-col md:flex-row gap-6 p-5 md:p-8">
                
                <!-- Kiri: Gambar & Harga CMT -->
                <div class="w-full md:w-2/5 flex flex-col gap-4">
                    <div class="w-full h-64 md:h-[380px] bg-indigo-50 border-4 border-indigo-100 rounded-[2rem] overflow-hidden flex items-center justify-center p-3 relative shadow-inner">
                        <span class="absolute top-4 right-4 bg-white/90 text-pink-500 text-[10px] font-cute font-bold tracking-widest px-4 py-2 rounded-full border-2 border-pink-200 backdrop-blur-md z-10 shadow-md">🔍 TAP ZOOM</span>
                        <img src="${currentImg}" loading="lazy" alt="Foto Baju" onclick="openZoom('${currentImg}')" class="w-full h-full object-contain cursor-zoom-in hover:scale-105 transition duration-500 rounded-xl" onerror="this.src='${DEFAULT_IMAGE}'">
                    </div>
                    
                    <div class="bg-gradient-to-b from-yellow-200 to-yellow-400 border-4 border-yellow-300 rounded-[2rem] p-5 shadow-[0_8px_0_#ca8a04] relative overflow-hidden text-center flex flex-col justify-center transform transition hover:-translate-y-1">
                        <span class="text-xs font-bold uppercase tracking-widest text-yellow-800 block mb-1">🏷️ Harga Jual</span>
                        <div class="text-2xl md:text-3xl font-cute font-bold text-yellow-900 drop-shadow-sm">${textHargaJual}</div>
                        ${profitHtml}
                    </div>
                </div>

                <!-- Kanan: Tabel Rincian -->
                <div class="w-full md:w-3/5 flex flex-col gap-4 overflow-hidden">
                    <div class="flex items-center justify-between shrink-0">
                        <h3 class="text-sm font-cute font-bold text-indigo-800 uppercase tracking-widest flex items-center gap-2 bg-indigo-100 px-4 py-2 rounded-full border-2 border-indigo-200">
                            🧵 Rincian Produksi
                        </h3>
                    </div>
                    
                    <div class="flex-1 bg-white border-4 border-indigo-100 rounded-[2rem] overflow-y-auto overflow-x-hidden min-h-[220px] max-h-[300px] md:max-h-[360px] shadow-inner p-1">
                        <table class="w-full text-left border-collapse">
                            <thead class="bg-indigo-100/90 sticky top-0 z-10 backdrop-blur-md shadow-sm rounded-t-xl">
                                <tr class="text-[10px] font-cute text-indigo-800 uppercase tracking-wider">
                                    <th class="py-2.5 px-2 md:px-3 rounded-tl-xl w-[28%] md:w-1/4">Proses</th>
                                    <th class="py-2.5 px-2 md:px-3 w-[44%] md:w-1/2">Spesifikasi Detail</th>
                                    <th class="py-2.5 px-2 md:px-3 text-right rounded-tr-xl w-[28%] md:w-1/4">Tarif</th>
                                </tr>
                            </thead>
                            <tbody>${rowsHtml}</tbody>
                        </table>
                    </div>

                    <div class="mt-auto shrink-0 pt-2 flex flex-col gap-4">
                        <div class="flex justify-between items-center bg-purple-100 px-5 py-4 rounded-[2rem] border-4 border-purple-200 shadow-sm">
                            <span class="text-sm font-cute font-bold text-purple-800 uppercase tracking-widest">Total Produksi</span>
                            <span class="text-xl md:text-2xl font-cute font-bold text-purple-900 bg-white px-4 py-1 rounded-full border-2 border-purple-200 shadow-sm">Rp ${currentTotalHPP.toLocaleString('id-ID')}</span>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="copyDataToClipboard()" class="btn-3d w-[28%] bg-blue-100 hover:bg-blue-200 text-blue-800 text-[11px] font-cute font-bold uppercase tracking-wider rounded-[1.5rem] shadow-[0_4px_0_#93c5fd] transition-all flex items-center justify-center border-2 border-blue-300 py-[13px] px-1" title="Salin Rincian">
                                COPY
                            </button>
                            <button onclick="sendToWhatsApp()" class="btn-3d w-[72%] bg-emerald-400 hover:bg-emerald-500 text-white text-[11px] font-cute font-bold uppercase tracking-wider py-[13px] px-2 rounded-[1.5rem] shadow-[0_5px_0_#059669] transition-all flex items-center justify-center gap-1 border-2 border-emerald-500">
                                Kirim via Whatsapp
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        `;
        document.getElementById('slideIndicator').innerHTML = `
            <span class="bg-indigo-100 text-indigo-800 px-3 py-1 rounded-lg border-2 border-indigo-200 shadow-sm">${currentSlideIndex + 1}</span> 
            <span class="text-indigo-400 mx-1">dari</span> 
            <span class="bg-white text-indigo-600 px-3 py-1 rounded-lg border-2 border-indigo-200 shadow-sm">${database.length}</span>
        `;
    }

    window.searchModel = function(query) {
        const dropdown = document.getElementById('searchDropdown');
        highlightedIndex = -1; 
        if (!query.trim()) { dropdown.classList.add('hidden'); return; }

        const results = database.filter(m => m.name.toLowerCase().includes(query.toLowerCase()));
        dropdown.innerHTML = '';
        if (results.length === 0) {
            dropdown.innerHTML = '<div class="p-5 text-sm font-cute text-pink-500 font-bold text-center">Yahh.. Model tidak ditemukan 🥺</div>';
        } else {
            results.forEach((model) => {
                const div = document.createElement('div');
                div.className = "search-item p-4 text-sm font-bold text-indigo-800 hover:bg-yellow-100 hover:text-yellow-900 cursor-pointer transition-colors flex justify-between items-center";
                div.innerHTML = `<span class="uppercase tracking-wide">${model.name}</span> <span class="text-[10px] font-cute bg-indigo-100 px-3 py-1 rounded-full border border-indigo-200 text-indigo-700">Pilih ✨</span>`;
                div.onclick = () => { selectModel(model); };
                dropdown.appendChild(div);
            });
        }
        dropdown.classList.remove('hidden');
    }

    function selectModel(model) {
        currentSlideIndex = database.findIndex(m => m.name === model.name);
        document.getElementById('searchDropdown').classList.add('hidden');
        document.getElementById('searchInput').value = '';
        changeSlide('none'); 
    }

    document.getElementById('searchInput').addEventListener('keydown', function(e) {
        const items = document.querySelectorAll('.search-item');
        if (items.length === 0) return;
        if (e.key === 'ArrowDown') { e.preventDefault(); highlightedIndex = (highlightedIndex + 1) % items.length; updateHighlight(items); } 
        else if (e.key === 'ArrowUp') { e.preventDefault(); highlightedIndex = (highlightedIndex - 1 + items.length) % items.length; updateHighlight(items); } 
        else if (e.key === 'Enter') { e.preventDefault(); if (highlightedIndex >= 0) items[highlightedIndex].click(); }
    });

    function updateHighlight(items) {
        items.forEach((item, idx) => {
            item.classList.toggle('bg-yellow-100', idx === highlightedIndex);
            item.classList.toggle('text-yellow-900', idx === highlightedIndex);
            if (idx === highlightedIndex) item.scrollIntoView({ block: 'nearest' });
        });
    }

    // Hanya panah keyboard yang tersisa untuk navigasi, fungsi sentuh/swipe telah dihapus
    document.addEventListener('keydown', function(event) {
        if (document.activeElement === document.getElementById('searchInput')) return; 
        if (event.key === 'ArrowRight') changeSlide('next');
        else if (event.key === 'ArrowLeft') changeSlide('prev');
    });
    
    document.addEventListener('click', e => { if (!e.target.closest('#searchInput')) document.getElementById('searchDropdown').classList.add('hidden'); });

    fetchSheetData();
</script>
</body>
</html>
