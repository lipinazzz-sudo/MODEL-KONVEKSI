<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Konveksi Owlet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col justify-start items-center p-6 overflow-y-auto relative">
    
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_right,rgba(20,184,166,0.04),transparent_50%)] pointer-events-none"></div>

    <header class="w-full max-w-7xl flex flex-col md:flex-row justify-between items-center gap-4 mb-6 relative z-50 bg-slate-900/40 border border-slate-900 p-4 rounded-2xl backdrop-blur-sm">
        <div class="flex items-center gap-3 shrink-0">
            <div class="w-10 h-10 rounded-full bg-teal-500/10 border border-slate-800 flex items-center justify-center text-lg">🦉</div>
            <div>
                <h1 class="text-xs font-bold tracking-tight text-slate-400">Model Konveksi Owlet</h1>
                <p class="text-[10px] text-emerald-400 flex items-center gap-1">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span> LIVE
                </p>
            </div>
        </div>

        <div class="text-center md:flex-1 px-4" id="headerModelTitle">
            <span class="text-[9px] font-bold uppercase tracking-widest text-teal-400/70 block">Harap Tunggu</span>
            <h2 class="text-xl font-black tracking-tight text-white uppercase mt-0.5">- MEMUAT -</h2>
        </div>
        
        <div class="w-full md:w-72 relative z-50 shrink-0">
            <div class="relative">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500 text-sm">🔍</span>
                <input type="text" id="searchInput" oninput="searchModel(this.value)" placeholder="Cari nama model pakaian..." class="w-full bg-slate-950 border border-slate-800 rounded-xl pl-9 pr-4 py-2 text-xs text-slate-200 placeholder-slate-500 focus:outline-none focus:border-teal-500/50 transition">
            </div>
            <div id="searchDropdown" class="absolute left-0 right-0 mt-1 bg-slate-900 border border-slate-800 rounded-xl overflow-hidden shadow-2xl hidden z-50 max-h-60 overflow-y-auto divide-y divide-slate-800/60"></div>
        </div>
    </header>

    <div id="slideContainer" class="w-full max-w-7xl bg-slate-900 border border-slate-800/80 rounded-2xl shadow-2xl p-6 relative z-10 min-h-[500px] flex flex-col justify-center">
        <div class="text-center py-24 text-slate-400 text-sm flex flex-col items-center gap-3">
            <div class="w-6 h-6 border-2 border-teal-500 border-t-transparent rounded-full animate-spin"></div>
            Mendownload & mensinkronisasi data dari Google Sheets Cloud...
        </div>
    </div>

    <div class="mt-6 flex items-center gap-6 z-30 bg-slate-900/90 backdrop-blur border border-slate-800 px-5 py-2 rounded-full shadow-xl sticky bottom-4">
        <button onclick="prevSlide()" class="text-slate-400 hover:text-white transition font-bold text-md px-2">←</button>
        <span class="text-xs font-semibold text-slate-400 tracking-wider uppercase" id="slideIndicator">Memuat...</span>
        <button onclick="nextSlide()" class="text-slate-400 hover:text-white transition font-bold text-md px-2">→</button>
    </div>

    <div id="imageModal" class="fixed inset-0 z-[100] hidden bg-slate-950/90 backdrop-blur-sm flex items-center justify-center p-4 cursor-zoom-out" onclick="closeZoom()">
    <img id="modalImg" src="" class="max-w-full max-h-[90vh] object-contain rounded-lg shadow-2xl" onclick="event.stopPropagation()">
    <div class="absolute top-5 right-5 text-slate-400 text-xs">Klik di mana saja untuk menutup</div>
</div>
    </div>

    <script>
        const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1L24DsxwQ0uLxblnKzJ3YzH91gnsXuEhb8OVcRsH3WNo/export?format=csv&gid=0";
        let database = [];
        let currentSlideIndex = 0;
        const orderedCategories = ["OBRAS", "JAHIT", "KAM", "KARET", "BIS", "NECCI", "PACKING"];
        const DEFAULT_IMAGE = "https://images.unsplash.com/photo-1558769132-cb1aea458c5e?q=80&w=600&auto=format&fit=crop";

        window.openZoom = function(imgSrc) {
            const modal = document.getElementById('imageModal');
            document.getElementById('modalImg').src = imgSrc;
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        };

        window.closeZoom = function() {
            document.getElementById('imageModal').classList.add('hidden');
            document.getElementById('imageModal').classList.remove('flex');
        };

        function getCategoryStyle(cat) {
            const styles = {
                "OBRAS": "bg-amber-500/10 text-amber-400 border border-amber-500/20",
                "JAHIT": "bg-teal-500/10 text-teal-400 border border-teal-500/20",
                "KAM": "bg-sky-500/10 text-sky-400 border border-sky-500/20",
                "KARET": "bg-purple-500/10 text-purple-400 border border-purple-500/20",
                "BIS": "bg-pink-500/10 text-pink-400 border border-pink-500/20",
                "NECCI": "bg-emerald-500/10 text-emerald-400 border border-emerald-500/20",
                "PACKING": "bg-slate-400/10 text-slate-300 border border-slate-400/20"
            };
            return styles[cat] || "bg-slate-800 text-slate-400 border border-slate-700";
        }

        function konversiLinkDrive(url) {
            if (!url) return "";
            if (url.includes("drive.google.com")) {
                const match = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
                if (match && match[1]) return `https://lh3.googleusercontent.com/d/${match[1]}=s1000`;
            }
            return url;
        }

        function parseCSVToJSON(csvText) {
            const lines = csvText.split(/\r?\n/);
            const modelsMap = {};
            const delimiter = (lines[0] || "").includes(";") ? ";" : ",";

            for (let i = 1; i < lines.length; i++) {
                let line = lines[i].trim();
                if (!line) continue;
                let columns = line.split(delimiter).map(c => c.replace(/^"|"$/g, '').trim());
                if (columns.length < 4) continue;

                const modelName = columns[0];
                const category = columns[1].toUpperCase();
                const details = columns[2];
                const price = parseInt(columns[3].replace(/[^0-9]/g, '')) || 0;
                let imageUrl = columns[4] || "";

                if (!modelsMap[modelName]) modelsMap[modelName] = { name: modelName, items: [], image: "" };
                modelsMap[modelName].items.push({ category, details, price });
                if (imageUrl && !modelsMap[modelName].image) modelsMap[modelName].image = konversiLinkDrive(imageUrl);
            }
            return Object.values(modelsMap);
        }

        async function fetchSheetData() {
            try {
                const response = await fetch(GOOGLE_SHEET_CSV_URL + "&cache_buster=" + Date.now());
                const csvText = await response.text();
                database = parseCSVToJSON(csvText);
                renderSlide();
            } catch (error) {
                console.error(error);
            }
        }

        function renderSlide() {
            const container = document.getElementById('slideContainer');
            if (database.length === 0) return;
            const model = database[currentSlideIndex];
            const currentImg = model.image || DEFAULT_IMAGE;
            
            // ... (Kode render tabel Anda tetap sama)
            // Pastikan bagian img memanggil openZoom:
            // <img src="${currentImg}" onclick="openZoom('${currentImg}')" ... >
            
            // Render bagian slideContainer tetap sesuai logika Anda sebelumnya
            // (Kode disederhanakan untuk ringkasnya, gunakan logic renderSlide Anda)
            renderSlideLogic(model, currentImg); 
        }

        // Pastikan fungsi renderSlideLogic berisi semua elemen tabel Anda
        function renderSlideLogic(model, currentImg) {
            // ... (Isi dengan fungsi renderSlide Anda sebelumnya)
        }

        window.nextSlide = function() { if (currentSlideIndex < database.length - 1) { currentSlideIndex++; renderSlide(); } }
        window.prevSlide = function() { if (currentSlideIndex > 0) { currentSlideIndex--; renderSlide(); } }

        fetchSheetData();
        setInterval(fetchSheetData, 30000);
    </script>
</body>
</html>
