<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Presentasi Model Konveksi Owlet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col justify-start items-center p-6 overflow-y-auto relative">
    
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_right,rgba(20,184,166,0.04),transparent_50%)] pointer-events-none"></div>

    <header class="w-full max-w-7xl flex flex-col md:flex-row justify-between items-center gap-4 mb-6 relative z-50 bg-slate-900/40 border border-slate-900 p-4 rounded-2xl backdrop-blur-sm">
        
        <div class="flex items-center gap-3 shrink-0">
            <div class="w-10 h-10 rounded-full bg-teal-500/10 border border-slate-800 flex items-center justify-center text-lg">🦉</div>
            <div>
                <h1 class="text-xs font-bold tracking-tight text-slate-400">Model Konveksi Owlet</h1>
                <p class="text-[10px] text-emerald-400 flex items-center gap-1">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span> LIVE CLOUD SINKRONISASI
                </p>
            </div>
        </div>

        <div class="text-center md:flex-1 px-4" id="headerModelTitle">
            <span class="text-[9px] font-bold uppercase tracking-widest text-teal-400/70 block">Artikel Sedang Ditampilkan</span>
            <h2 class="text-xl font-black tracking-tight text-white uppercase mt-0.5">- MEMUAT ARTIKEL -</h2>
        </div>
        
        <div class="w-full md:w-72 relative z-50 shrink-0">
            <div class="relative">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500 text-sm">🔍</span>
                <input type="text" id="searchInput" oninput="searchModel(this.value)" placeholder="Cari nama model pakaian..." class="w-full bg-slate-950 border border-slate-800 rounded-xl pl-9 pr-4 py-2 text-xs text-slate-200 placeholder-slate-500 focus:outline-none focus:border-teal-500/50 transition">
            </div>
            <div id="searchDropdown" class="absolute left-0 right-0 mt-1 bg-slate-900 border border-slate-800 rounded-xl overflow-hidden shadow-2xl hidden z-50 max-h-60 overflow-y-auto divide-y divide-slate-800/60"></div>
        </div>
    </header>

    <div id="slideContainer" class="w-full max-w-7xl bg-slate-900 border border-slate-800/80 rounded-2xl shadow-2xl p-6 relative z-10 min-h-[500px] flex flex-col justify-center">
        <div class="text-center py-24 text-slate-400 text-sm flex flex-col items-center gap-3">
            <div class="w-6 h-6 border-2 border-teal-500 border-t-transparent rounded-full animate-spin"></div>
            Mendownload & mensinkronisasi data dari Google Sheets Cloud...
        </div>
    </div>

    <div class="mt-6 flex items-center gap-6 z-30 bg-slate-900/90 backdrop-blur border border-slate-800 px-5 py-2 rounded-full shadow-xl sticky bottom-4">
        <button onclick="prevSlide()" class="text-slate-400 hover:text-white transition font-bold text-md px-2">←</button>
        <span class="text-xs font-semibold text-slate-400 tracking-wider uppercase" id="slideIndicator">Memuat...</span>
        <button onclick="nextSlide()" class="text-slate-400 hover:text-white transition font-bold text-md px-2">→</button>
    </div>

    <script>
        const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1L24DsxwQ0uLxblnKzJ3YzH91gnsXuEhb8OVcRsH3WNo/export?format=csv&gid=0";

        let database = [];
        let currentSlideIndex = 0;
        const orderedCategories = ["OBRAS", "JAHIT", "KAM", "KARET", "BIS", "NECCI", "PACKING"];
        const DEFAULT_IMAGE = "https://images.unsplash.com/photo-1558769132-cb1aea458c5e?q=80&w=600&auto=format&fit=crop";

        function getCategoryStyle(cat) {
            const styles = {
                "OBRAS": "bg-amber-500/10 text-amber-400 border border-amber-500/20",
                "JAHIT": "bg-teal-500/10 text-teal-400 border border-teal-500/20",
                "KAM": "bg-sky-500/10 text-sky-400 border border-sky-500/20",
                "KARET": "bg-purple-500/10 text-purple-400 border border-purple-500/20",
                "BIS": "bg-pink-500/10 text-pink-400 border border-pink-500/20",
                "NECCI": "bg-emerald-500/10 text-emerald-400 border border-emerald-500/20",
                "PACKING": "bg-slate-400/10 text-slate-300 border border-slate-400/20"
            };
            return styles[cat] || "bg-slate-800 text-slate-400 border border-slate-700";
        }

        // Fungsi Konversi Otomatis Link Google Drive biasa menjadi Direct Link Gambar
        function konversiLinkDrive(url) {
            if (!url) return "";
            if (url.includes("drive.google.com")) {
                // Ekstrak ID File unik dari link Google Drive
                const match = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
                if (match && match[1]) {
                    return `https://lh3.googleusercontent.com/d/${match[1]}`;
                }
            }
            return url;
        }

        function parseCSVToJSON(csvText) {
            const lines = csvText.split(/\r?\n/);
            const modelsMap = {};

            const firstLine = lines[0] || "";
            const delimiter = firstLine.includes(";") ? ";" : ",";

            for (let i = 1; i < lines.length; i++) {
                let line = lines[i].trim();
                if (!line) continue;
                
                let columns = [];
                let inQuotes = false;
                let currentColumn = "";

                for (let j = 0; j < line.length; j++) {
                    let char = line[j];
                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === delimiter && !inQuotes) {
                        columns.push(currentColumn.trim());
                        currentColumn = "";
                    } else {
                        currentColumn += char;
                    }
                }
                columns.push(currentColumn.trim());

                if (columns.length < 4) continue;

                const modelName = columns[0].replace(/^"|"$/g, '').trim();
                const category = columns[1].replace(/^"|"$/g, '').trim().toUpperCase();
                const details = columns[2].replace(/^"|"$/g, '').trim();
                const price = parseInt(columns[3].replace(/[^0-9]/g, '')) || 0;
                let imageUrl = (columns[4] && columns[4].trim()) ? columns[4].replace(/^"|"$/g, '').trim() : "";

                if (!modelName) continue;

                if (!modelsMap[modelName]) {
                    modelsMap[modelName] = { name: modelName, items: [], image: "" };
                }
                
                modelsMap[modelName].items.push({ category, details, price });
                
                if (imageUrl && !modelsMap[modelName].image) {
                    modelsMap[modelName].image = konversiLinkDrive(imageUrl);
                }
            }
            return Object.values(modelsMap);
        }

        async function fetchSheetData() {
            try {
                const response = await fetch(GOOGLE_SHEET_CSV_URL + "&cache_buster=" + Date.now());
                if (!response.ok) throw new Error("Gagal mengambil data (Status: " + response.status + ")");
                
                const csvText = await response.text();
                if (!csvText.trim() || csvText.includes("<!DOCTYPE html>")) {
                    throw new Error("Akses ditolak atau dokumen belum di-Publish ke Web.");
                }

                const oldModelName = database[currentSlideIndex]?.name;
                database = parseCSVToJSON(csvText);

                if (database.length > 0) {
                    if (oldModelName) {
                        const newIndex = database.findIndex(m => m.name === oldModelName);
                        if (newIndex !== -1) currentSlideIndex = newIndex;
                    }
                    renderSlide();
                } else {
                    document.getElementById('slideContainer').innerHTML = '<div class="text-center py-24 text-amber-400 text-xs">⚠️ Tabel data kosong atau format kolom salah.</div>';
                }
            } catch (error) {
                console.error(error);
                document.getElementById('slideContainer').innerHTML = `
                    <div class="text-center py-20 text-red-400 text-xs flex flex-col items-center gap-2">
                        <span class="text-lg">❌ Koneksi Cloud Tertahan</span>
                        <span class="text-[11px] text-slate-500 max-w-md mt-1">${error.message}</span>
                        <button onclick="fetchSheetData()" class="mt-5 bg-slate-800 text-slate-300 border border-slate-700 px-4 py-1.5 rounded-xl text-[10px] hover:bg-slate-700 transition">Coba Hubungkan Ulang</button>
                    </div>
                `;
            }
        }

        function renderSlide() {
            const container = document.getElementById('slideContainer');
            if (database.length === 0) return;

            if (currentSlideIndex >= database.length) currentSlideIndex = database.length - 1;
            const model = database[currentSlideIndex];
            const totalHpp = model.items.reduce((sum, item) => sum + item.price, 0);

            document.getElementById('headerModelTitle').innerHTML = `
                <span class="text-[9px] font-bold uppercase tracking-widest text-teal-400 block">Artikel Sedang Ditampilkan</span>
                <h2 class="text-xl font-black tracking-tight text-white uppercase mt-0.5">${model.name}</h2>
            `;

            const currentImg = model.image ? model.image : DEFAULT_IMAGE;

            let rowsHtml = '';
            orderedCategories.forEach(cat => {
                const catItems = model.items.filter(item => item.category === cat);
                if (catItems.length > 0) {
                    let catTotal = 0;
                    catItems.forEach(item => {
                        catTotal += item.price;
                        rowsHtml += `
                            <tr class="border-b border-slate-800/30 hover:bg-slate-800/10 transition">
                                <td class="py-2 px-3"><span class="text-[9px] font-bold tracking-wider px-2 py-0.5 rounded ${getCategoryStyle(item.category)}">${item.category}</span></td>
                                <td class="py-2 px-3 text-xs text-slate-300">${item.details}</td>
                                <td class="py-2 px-3 text-right font-mono text-slate-300 text-xs">Rp ${item.price.toLocaleString('id-ID')}</td>
                            </tr>
                        `;
                    });
                    rowsHtml += `
                        <tr class="bg-slate-900/30 border-b border-slate-800/80 font-medium text-slate-400 text-[11px]">
                            <td colspan="2" class="py-1.5 px-3 italic text-right">Subtotal ${cat} :</td>
                            <td class="py-1.5 px-3 text-right font-mono text-teal-500/80 font-bold">Rp ${catTotal.toLocaleString('id-ID')}</td>
                        </tr>
                    `;
                }
            });

            container.innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-stretch">
                    <div class="lg:col-span-5 flex flex-col bg-slate-950/40 border border-slate-800/60 p-4 rounded-xl min-h-[400px]">
                        <div class="w-full flex-1 flex items-center justify-center bg-slate-950/80 border border-slate-900 rounded-xl overflow-hidden relative group shadow-inner">
                            <img src="${currentImg}" alt="Foto Pakaian" class="w-full h-full object-cover opacity-90 group-hover:scale-105 transition duration-500" onerror="this.src='${DEFAULT_IMAGE}'">
                            <div class="absolute inset-0 bg-gradient-to-t from-slate-950/90 via-transparent to-transparent"></div>
                            <span class="absolute bottom-3 left-3 text-[10px] font-bold tracking-widest bg-teal-500/10 text-teal-400 border border-teal-500/20 backdrop-blur px-2 py-1 rounded">IMAGE LIVE DOCK</span>
                        </div>
                    </div>
                    <div class="lg:col-span-7 flex flex-col justify-between gap-4">
                        <div class="flex flex-col gap-3">
                            <div class="border-b border-slate-800 pb-2">
                                <h3 class="text-sm font-bold text-slate-200 tracking-wide">List Harga Kerjaan</h3>
                                <p class="text-xs text-slate-400 mt-0.5">Rincian jasa operasional pengerjaan tiap divisi</p>
                            </div>
                            <div class="bg-slate-950/80 border border-slate-800 rounded-xl overflow-hidden shadow-xl max-h-[360px] overflow-y-auto">
                                <table class="w-full text-left border-collapse">
                                    <thead>
                                        <tr class="bg-slate-900 text-[9px] font-bold text-slate-400 uppercase tracking-wider border-b border-slate-800 sticky top-0 z-10">
                                            <th class="py-2.5 px-3 w-1/4">Kategori</th>
                                            <th class="py-2.5 px-3 w-1/2">Detail Pekerjaan</th>
                                            <th class="py-2.5 px-3 text-right w-1/4">Nilai Jasa</th>
                                        </tr>
                                    </thead>
                                    <tbody>${rowsHtml}</tbody>
                                </table>
                            </div>
                        </div>
                        <div class="bg-gradient-to-r from-teal-500/10 to-emerald-500/5 border border-teal-500/20 px-4 py-3.5 rounded-xl flex justify-between items-center shadow-lg mt-auto">
                            <div>
                                <span class="block text-[9px] font-black uppercase tracking-widest text-teal-400">Total Keseluruhan</span>
                                <span class="text-xs text-slate-300">HPP Harga Pokok Produksi</span>
                            </div>
                            <div class="text-right">
                                <span class="text-xl font-black text-teal-400 font-mono tracking-tight">Rp ${totalHpp.toLocaleString('id-ID')}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('slideIndicator').innerText = `Model ${currentSlideIndex + 1} dari ${database.length}`;
        }

        window.searchModel = function(query) {
            const dropdown = document.getElementById('searchDropdown');
            if (!query.trim()) { dropdown.classList.add('hidden'); return; }

            const results = database.filter(m => m.name.toLowerCase().includes(query.toLowerCase()));
            dropdown.innerHTML = '';
            
            if (results.length === 0) {
                dropdown.innerHTML = '<div class="p-3 text-xs text-slate-500 italic text-center bg-slate-900">Model tidak ditemukan</div>';
            } else {
                results.forEach(model => {
                    const div = document.createElement('div');
                    div.className = "p-3 text-xs text-slate-300 hover:bg-slate-800 cursor-pointer transition flex justify-between items-center bg-slate-900/95 backdrop-blur";
                    div.innerHTML = `<span class="font-bold text-slate-200 uppercase">${model.name}</span><span class="text-[10px] bg-teal-500/10 text-teal-400 px-1.5 py-0.5 rounded font-mono">Lihat →</span>`;
                    div.onclick = () => {
                        currentSlideIndex = database.findIndex(m => m.name === model.name);
                        dropdown.classList.add('hidden');
                        document.getElementById('searchInput').value = '';
                        renderSlide();
                    };
                    dropdown.appendChild(div);
                });
            }
            dropdown.classList.remove('hidden');
        }

        window.nextSlide = function() { if (currentSlideIndex < database.length - 1) { currentSlideIndex++; renderSlide(); } }
        window.prevSlide = function() { if (currentSlideIndex > 0) { currentSlideIndex--; renderSlide(); } }

        document.addEventListener('click', e => { if (!e.target.closest('#searchInput')) document.getElementById('searchDropdown').classList.add('hidden'); });

        fetchSheetData();
        setInterval(fetchSheetData, 5000);
    </script>
</body>
</html>
