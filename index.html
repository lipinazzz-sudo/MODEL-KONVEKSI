<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Konveksi Owlet - Harga Jual</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: rgba(20, 184, 166, 0.3); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(20, 184, 166, 0.6); }

        .slide-content {
            transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1), transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 1; transform: translateY(0) scale(1);
        }
        .slide-hidden { opacity: 0; transform: translateY(15px) scale(0.98); }
        .toast-enter { transform: translateY(100%); opacity: 0; }
        .toast-show { transform: translateY(0); opacity: 1; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col justify-start items-center p-4 md:p-6 overflow-x-hidden relative selection:bg-teal-500/30">
    
    <div id="toastContainer" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[300] flex flex-col gap-2 pointer-events-none"></div>

    <!-- Modal Zoom -->
    <div id="imageModal" class="fixed inset-0 z-[200] hidden bg-slate-950/95 backdrop-blur-md flex items-center justify-center p-4 overflow-hidden touch-none" onclick="closeZoom()">
        <img id="modalImg" src="" 
             class="max-w-full max-h-[90vh] object-contain rounded-lg shadow-2xl transition-transform duration-300 cursor-zoom-in relative" 
             onclick="toggleZoom(event)" onmousedown="startDrag(event)" onmousemove="onDrag(event)" onmouseup="endDrag()" onmouseleave="endDrag()"
             ontouchstart="startDrag(event)" ontouchmove="onDrag(event)" ontouchend="endDrag()">
        
        <div class="absolute top-5 right-5 flex flex-col gap-2 items-end pointer-events-none">
            <div class="text-slate-300 text-[10px] md:text-[11px] font-bold uppercase tracking-widest bg-slate-900/80 px-3 md:px-4 py-2 rounded-full border border-slate-700 backdrop-blur-md shadow-lg">
                🔍 Klik Zoom 100% | Tahan & Geser
            </div>
        </div>
    </div>

    <!-- Background Ambient -->
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_right,rgba(20,184,166,0.06),transparent_50%)] pointer-events-none"></div>

    <!-- Header -->
    <header class="w-full max-w-7xl flex flex-col md:flex-row justify-between items-center gap-4 mb-6 relative z-50 bg-slate-900/70 border border-slate-800 p-4 rounded-2xl backdrop-blur-xl shadow-2xl">
        <div class="flex items-center gap-3 shrink-0 w-full md:w-auto justify-center md:justify-start">
            <div class="w-11 h-11 rounded-full bg-gradient-to-br from-teal-500/20 to-emerald-500/10 border border-teal-500/30 flex items-center justify-center text-xl shadow-[0_0_20px_rgba(20,184,166,0.15)]">🦉</div>
            <div>
                <h1 class="text-sm font-bold tracking-tight text-slate-200">Owlet Konveksi</h1>
                <p id="syncStatus" class="text-[10px] text-emerald-400 font-medium flex items-center gap-1.5 justify-center md:justify-start transition-colors mt-0.5">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse shadow-[0_0_8px_rgba(16,185,129,0.8)]"></span> ONLINE
                </p>
            </div>
        </div>

        <div class="text-center md:flex-1 px-4" id="headerModelTitle">
            <span class="text-[9px] font-bold uppercase tracking-widest text-teal-500/80 block">Harap Tunggu</span>
            <h2 class="text-xl font-black tracking-tight text-white uppercase mt-0.5">- MEMUAT -</h2>
        </div>
        
        <div class="w-full md:w-80 relative z-50 shrink-0 flex gap-2">
            <div class="relative w-full group">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500 text-sm group-focus-within:text-teal-400 transition-colors">🔍</span>
                <input type="text" id="searchInput" oninput="searchModel(this.value)" placeholder="Cari SKU / nama model..." class="w-full bg-slate-950/80 border border-slate-800 rounded-xl pl-9 pr-4 py-2.5 md:py-2.5 text-xs text-slate-200 placeholder-slate-500 focus:outline-none focus:border-teal-500/50 focus:ring-2 focus:ring-teal-500/20 transition-all shadow-inner">
            </div>
            <button onclick="manualRefresh()" aria-label="Refresh Data" class="w-11 h-11 md:h-auto shrink-0 flex items-center justify-center bg-slate-950/80 border border-slate-800 rounded-xl hover:bg-slate-800 hover:text-teal-400 hover:border-teal-500/30 active:scale-95 transition-all shadow-inner text-sm" title="Sinkronisasi Data Cloud">
                🔄
            </button>
            <div id="searchDropdown" class="absolute left-0 right-14 mt-12 bg-slate-900 border border-slate-700 rounded-xl overflow-hidden shadow-[0_10px_40px_rgba(0,0,0,0.5)] hidden z-50 max-h-60 overflow-y-auto divide-y divide-slate-800/60 backdrop-blur-xl"></div>
        </div>
    </header>

    <!-- Kontainer Utama -->
    <div id="slideWrapper" class="w-full max-w-7xl bg-slate-900/60 backdrop-blur-lg border border-slate-800/80 rounded-2xl shadow-2xl relative z-10 min-h-[400px] md:min-h-[500px] flex flex-col justify-center overflow-hidden">
        <div id="slideContainer" class="slide-content w-full h-full transition-all duration-300">
            <!-- Loading Skeleton -->
            <div class="w-full h-full flex flex-col md:flex-row gap-6 p-6 animate-pulse">
                <div class="w-full md:w-2/5 h-64 md:h-[450px] bg-slate-800/50 rounded-xl"></div>
                <div class="w-full md:w-3/5 flex flex-col gap-4">
                    <div class="h-6 w-1/3 bg-slate-800/50 rounded"></div>
                    <div class="flex-1 bg-slate-800/30 rounded-xl min-h-[200px]"></div>
                    <div class="h-24 bg-slate-800/50 rounded-xl"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Navigasi Bawah -->
    <nav class="mt-6 flex items-center gap-4 z-30 bg-slate-900/80 backdrop-blur-xl border border-slate-800/80 p-1.5 rounded-full shadow-2xl sticky bottom-4 transition-all duration-300">
        <button type="button" onclick="changeSlide('prev')" aria-label="Model Sebelumnya" 
                class="w-12 h-12 md:w-10 md:h-10 flex items-center justify-center rounded-full border border-slate-700 bg-slate-950 text-slate-300 hover:text-teal-400 hover:border-teal-500/50 hover:bg-slate-800 active:scale-90 transition-all duration-200">
            <span class="text-lg font-bold select-none">←</span>
        </button>
        
        <span class="text-[11px] font-bold text-slate-400 tracking-widest uppercase px-3 select-none flex items-center gap-2" id="slideIndicator">
            Memuat...
        </span>
        
        <button type="button" onclick="changeSlide('next')" aria-label="Model Selanjutnya" 
                class="w-12 h-12 md:w-10 md:h-10 flex items-center justify-center rounded-full border border-slate-700 bg-slate-950 text-slate-300 hover:text-teal-400 hover:border-teal-500/50 hover:bg-slate-800 active:scale-90 transition-all duration-200">
            <span class="text-lg font-bold select-none">→</span>
        </button>
    </nav>

    <script>
        const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1L24DsxwQ0uLxblnKzJ3YzH91gnsXuEhb8OVcRsH3WNo/export?format=csv&gid=0";

        let database = [], highlightedIndex = -1, currentSlideIndex = 0, currentTotalHPP = 0;
        const orderedCategories = ["OBRAS", "JAHIT", "KAM", "KARET", "BIS", "NECCI", "PACKING"];
        const DEFAULT_IMAGE = "https://images.unsplash.com/photo-1558769132-cb1aea458c5e?q=80&w=600&auto=format&fit=crop";

        window.showToast = function(message, type = "success") {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const icon = type === "success" ? "✅" : (type === "sync" ? "🔄" : "⚠️");
            const bgColor = type === "success" ? "bg-emerald-900/90 border-emerald-500/50" : (type === "sync" ? "bg-blue-900/90 border-blue-500/50" : "bg-red-900/90 border-red-500/50");
            
            toast.className = `flex items-center gap-2 px-4 py-2.5 rounded-full border ${bgColor} text-white text-xs font-bold shadow-xl backdrop-blur-md toast-enter transition-all duration-300`;
            toast.innerHTML = `<span>${icon}</span> <span>${message}</span>`;
            
            container.appendChild(toast);
            setTimeout(() => { toast.classList.remove('toast-enter'); toast.classList.add('toast-show'); }, 10);
            setTimeout(() => { toast.classList.remove('toast-show'); toast.classList.add('toast-enter'); setTimeout(() => toast.remove(), 300); }, 3000);
        };

        // FUNGSI ZOOM, DRAG & FULLSCREEN
        let isZoomed = false, scaleValue = 1, isDragging = false, dragMoved = false; 
        let startX, startY, translateX = 0, translateY = 0;

        function updateTransform() { document.getElementById('modalImg').style.transform = `translate(${translateX}px, ${translateY}px) scale(${scaleValue})`; }

        window.openZoom = function(imgSrc) {
            const modal = document.getElementById('imageModal'), modalImg = document.getElementById('modalImg');
            modalImg.src = imgSrc; isZoomed = false; scaleValue = 1; translateX = 0; translateY = 0; updateTransform();
            modalImg.className = "max-w-full max-h-[90vh] object-contain rounded-lg shadow-2xl transition-transform duration-300 cursor-zoom-in relative";
            modal.classList.remove('hidden'); modal.classList.add('flex'); document.body.style.overflow = 'hidden'; 
        };
        window.closeZoom = function() {
            const modal = document.getElementById('imageModal');
            modal.classList.add('hidden'); modal.classList.remove('flex'); document.body.style.overflow = ''; 
        };
        window.toggleZoom = function(event) {
            event.stopPropagation(); if (dragMoved) { dragMoved = false; return; }
            isZoomed = !isZoomed;
            const modalImg = document.getElementById('modalImg');
            if (isZoomed) { scaleValue = 2; modalImg.classList.replace('cursor-zoom-in', 'cursor-grab'); } 
            else { scaleValue = 1; translateX = 0; translateY = 0; modalImg.classList.remove('cursor-grab', 'cursor-grabbing'); modalImg.classList.add('cursor-zoom-in'); }
            updateTransform();
        };
        window.startDrag = function(event) {
            if (!isZoomed) return; if(event.cancelable) event.preventDefault(); 
            isDragging = true; dragMoved = false; 
            const clientX = event.touches ? event.touches[0].clientX : event.clientX;
            const clientY = event.touches ? event.touches[0].clientY : event.clientY;
            startX = clientX - translateX; startY = clientY - startY;
            document.getElementById('modalImg').classList.replace('cursor-grab', 'cursor-grabbing');
            document.getElementById('modalImg').classList.remove('transition-transform', 'duration-300'); 
        };
        window.onDrag = function(event) {
            if (!isDragging || !isZoomed) return; dragMoved = true; 
            const clientX = event.touches ? event.touches[0].clientX : event.clientX;
            const clientY = event.touches ? event.touches[0].clientY : event.clientY;
            translateX = clientX - startX; translateY = clientY - startY; updateTransform();
        };
        window.endDrag = function() {
            if (!isDragging) return; isDragging = false;
            const modalImg = document.getElementById('modalImg');
            modalImg.classList.replace('cursor-grabbing', 'cursor-grab'); modalImg.classList.add('transition-transform', 'duration-300'); 
        };

        function getCategoryStyle(cat) {
            const styles = { "OBRAS": "bg-amber-500/15 text-amber-400 border-amber-500/30", "JAHIT": "bg-teal-500/15 text-teal-400 border-teal-500/30", "KAM": "bg-sky-500/15 text-sky-400 border-sky-500/30", "KARET": "bg-purple-500/15 text-purple-400 border-purple-500/30", "BIS": "bg-pink-500/15 text-pink-400 border-pink-500/30", "NECCI": "bg-emerald-500/15 text-emerald-400 border-emerald-500/30", "PACKING": "bg-slate-400/15 text-slate-300 border-slate-400/30" };
            return styles[cat] ? `border ${styles[cat]}` : "bg-slate-800 text-slate-400 border border-slate-700";
        }

        function konversiLinkDrive(url) {
            if (!url) return "";
            if (url.includes("drive.google.com")) { const match = url.match(/\/d\/([a-zA-Z0-9-_]+)/); if (match && match[1]) return `https://lh3.googleusercontent.com/d/$${match[1]}`; }
            return url;
        }

        function parseCSVToJSON(csvText) {
            const lines = csvText.split(/\r?\n/); const modelsMap = {};
            const delimiter = (lines[0] || "").includes(";") ? ";" : ",";

            for (let i = 1; i < lines.length; i++) {
                let line = lines[i].trim(); if (!line) continue;
                let columns = [], inQuotes = false, currentColumn = "";
                for (let j = 0; j < line.length; j++) {
                    let char = line[j];
                    if (char === '"') inQuotes = !inQuotes;
                    else if (char === delimiter && !inQuotes) { columns.push(currentColumn.trim()); currentColumn = ""; }
                    else currentColumn += char;
                }
                columns.push(currentColumn.trim());
                if (columns.length < 4) continue;

                const modelName = columns[0].replace(/^"|"$/g, '').trim();
                const category = columns[1].replace(/^"|"$/g, '').trim().toUpperCase();
                const details = columns[2].replace(/^"|"$/g, '').trim();
                const price = parseInt(columns[3].replace(/[^0-9]/g, '')) || 0;
                let imageUrl = (columns[4] && columns[4].trim()) ? columns[4].replace(/^"|"$/g, '').trim() : "";
                
                // MENGAMBIL HARGA JUAL DARI KOLOM KE-6 (Index 5)
                let hargaJual = parseInt((columns[5] || "").replace(/[^0-9]/g, '')) || 0;

                if (!modelName) continue;
                if (!modelsMap[modelName]) {
                    modelsMap[modelName] = { name: modelName, items: [], image: "", hargaJual: hargaJual };
                } else {
                    // Update harga jual jika di baris sebelumnya 0, tapi di baris ini ada isinya
                    if (modelsMap[modelName].hargaJual === 0 && hargaJual > 0) {
                        modelsMap[modelName].hargaJual = hargaJual;
                    }
                }
                
                modelsMap[modelName].items.push({ category, details, price });
                if (imageUrl && !modelsMap[modelName].image) modelsMap[modelName].image = konversiLinkDrive(imageUrl);
            }
            return Object.values(modelsMap);
        }

        async function fetchSheetData(isManual = false) {
            const syncStatus = document.getElementById('syncStatus');
            syncStatus.innerHTML = `<span class="w-2 h-2 rounded-full border-2 border-amber-500 border-t-transparent animate-spin"></span> SYNCING`;
            syncStatus.className = "text-[10px] text-amber-400 font-medium flex items-center gap-1.5 justify-center md:justify-start mt-0.5";

            try {
                const response = await fetch(GOOGLE_SHEET_CSV_URL + "&cache_buster=" + Date.now());
                if (!response.ok) throw new Error("Gagal mengambil data");
                const csvText = await response.text();
                if (!csvText.trim() || csvText.includes("<!DOCTYPE html>")) throw new Error("Akses ditolak");

                const oldModelName = database[currentSlideIndex]?.name;
                database = parseCSVToJSON(csvText).sort((a, b) => a.name.localeCompare(b.name));

                if (database.length > 0) {
                    if (oldModelName) {
                        const newIndex = database.findIndex(m => m.name === oldModelName);
                        if (newIndex !== -1) currentSlideIndex = newIndex;
                    }
                    if(isManual) {
                        changeSlide('none');
                        showToast("Data berhasil disinkronisasi!", "success");
                    } else renderSlide(false); 
                } else {
                    document.getElementById('slideContainer').innerHTML = '<div class="text-center py-24 text-amber-400 text-xs">⚠️ Tabel data kosong.</div>';
                }
                
                syncStatus.innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse shadow-[0_0_8px_rgba(16,185,129,0.8)]"></span> ONLINE`;
                syncStatus.className = "text-[10px] text-emerald-400 font-medium flex items-center gap-1.5 justify-center md:justify-start transition-colors mt-0.5";
            } catch (error) {
                console.error(error);
                syncStatus.innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-red-500"></span> OFFLINE`;
                syncStatus.className = "text-[10px] text-red-400 font-medium flex items-center gap-1.5 justify-center md:justify-start transition-colors mt-0.5";
                if(isManual) showToast("Gagal menyinkronkan data.", "error");
            }
        }

        window.manualRefresh = function() { fetchSheetData(true); };

        function generateTextSummary() {
            if (database.length === 0) return "";
            const model = database[currentSlideIndex];
            
            let text = `*📋 RINCIAN HARGA PRODUKSI*\n`;
            text += `--------------------------------------------------\n`;
            text += `*Nama SKU/Model:* _${model.name.toUpperCase()}_\n`;
            text += `--------------------------------------------------\n\n`;

            orderedCategories.forEach(cat => {
                const catItems = model.items.filter(item => item.category === cat);
                if (catItems.length > 0) {
                    text += `*🔹 ${cat}*\n`;
                    let catTotal = 0;
                    catItems.forEach(item => {
                        catTotal += item.price;
                        text += `  • ${item.details} = Rp ${item.price.toLocaleString('id-ID')}\n`;
                    });
                    text += `  *Subtotal:* Rp ${catTotal.toLocaleString('id-ID')}\n\n`;
                }
            });
            text += `--------------------------------------------------\n`;
            text += `*🛠️ TOTAL HPP PRODUKSI : Rp ${currentTotalHPP.toLocaleString('id-ID')}*\n`;
            
            if (model.hargaJual > 0) {
                text += `*🏷️ HARGA JUAL SATUAN : Rp ${model.hargaJual.toLocaleString('id-ID')}*\n`;
            }
            
            text += `--------------------------------------------------\n`;
            text += `_Dihasilkan via Aplikasi Owlet Konveksi_`;
            
            return text;
        }

        window.sendToWhatsApp = function() {
            const text = generateTextSummary();
            if(text) window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`, '_blank');
        };

        window.copyDataToClipboard = function() {
            const text = generateTextSummary();
            if(!text) return;
            navigator.clipboard.writeText(text).then(() => { showToast("Rincian disalin ke Clipboard!", "success"); })
            .catch(err => { showToast("Gagal menyalin.", "error"); });
        };

        window.changeSlide = function(direction) {
            if (database.length === 0) return;
            if (direction === 'next' && currentSlideIndex < database.length - 1) currentSlideIndex++;
            else if (direction === 'prev' && currentSlideIndex > 0) currentSlideIndex--;
            else if (direction === 'next' || direction === 'prev') return; 

            const container = document.getElementById('slideContainer');
            container.classList.add('slide-hidden');
            setTimeout(() => { renderSlide(); container.classList.remove('slide-hidden'); }, 300); 
        };

        function renderSlide() {
            const container = document.getElementById('slideContainer');
            if (database.length === 0) return;
            if (currentSlideIndex >= database.length) currentSlideIndex = database.length - 1;
            
            const model = database[currentSlideIndex];
            currentTotalHPP = model.items.reduce((sum, item) => sum + item.price, 0);

            document.getElementById('headerModelTitle').innerHTML = `
                <span class="text-[9px] font-bold uppercase tracking-widest text-teal-400 block">Identitas Model</span>
                <h2 class="text-xl md:text-2xl font-black tracking-tight text-white uppercase mt-0.5 drop-shadow-md">${model.name}</h2>
            `;

            const currentImg = model.image ? model.image : DEFAULT_IMAGE;
            let rowsHtml = '';
            
            orderedCategories.forEach(cat => {
                const catItems = model.items.filter(item => item.category === cat);
                if (catItems.length > 0) {
                    let catTotal = 0;
                    catItems.forEach(item => {
                        catTotal += item.price;
                        rowsHtml += `
                            <tr class="border-b border-slate-800/40 hover:bg-slate-800/30 transition-colors">
                                <td class="py-2.5 md:py-2.5 px-2 md:px-3 whitespace-nowrap"><span class="text-[9px] font-bold tracking-wider px-2.5 py-1 rounded shadow-sm ${getCategoryStyle(item.category)}">${item.category}</span></td>
                                <td class="py-2.5 md:py-2.5 px-2 md:px-3 text-xs text-slate-300 min-w-[120px] font-medium">${item.details}</td>
                                <td class="py-2.5 md:py-2.5 px-2 md:px-3 text-right font-mono text-slate-300 text-xs whitespace-nowrap">Rp ${item.price.toLocaleString('id-ID')}</td>
                            </tr>
                        `;
                    });
                    rowsHtml += `
                        <tr class="bg-slate-900/50 border-b border-slate-800/80 font-medium text-slate-400 text-[11px]">
                            <td colspan="2" class="py-2 md:py-2 px-3 italic text-right">Subtotal ${cat} :</td>
                            <td class="py-2 md:py-2 px-3 text-right font-mono text-teal-400/90 font-bold whitespace-nowrap">Rp ${catTotal.toLocaleString('id-ID')}</td>
                        </tr>
                    `;
                }
            });

            // Logika UI Harga Jual & Profit
            const textHargaJual = model.hargaJual > 0 ? `Rp ${model.hargaJual.toLocaleString('id-ID')}` : "Belum Set";
            const profitKotor = model.hargaJual - currentTotalHPP;
            let profitHtml = '';
            
            if (model.hargaJual > 0) {
                const profitColor = profitKotor > 0 ? 'text-emerald-400' : (profitKotor === 0 ? 'text-slate-400' : 'text-red-400');
                profitHtml = `
                    <div class="text-[9px] text-slate-400 mt-2 font-medium flex items-center justify-center gap-1.5">
                        <span>Profit Kotor:</span>
                        <span class="${profitColor} font-bold font-mono bg-slate-950 px-2 py-0.5 rounded border border-slate-700">Rp ${profitKotor.toLocaleString('id-ID')}</span>
                    </div>
                `;
            } else {
                profitHtml = `<div class="text-[9px] text-amber-500/50 mt-2 font-medium italic">Data Harga Jual Kosong</div>`;
            }

            container.innerHTML = `
                <div class="w-full h-full flex flex-col md:flex-row gap-5 md:gap-6 p-4 md:p-6">
                    <!-- Sisi Kiri (Gambar & Harga Jual) -->
                    <div class="w-full md:w-2/5 flex flex-col gap-3">
                        <div class="w-full h-56 md:h-[400px] bg-slate-950/80 border border-slate-800 rounded-2xl overflow-hidden flex items-center justify-center p-2 relative shadow-inner">
                            <span class="absolute top-3 right-3 bg-slate-900/80 text-slate-400 text-[9px] font-bold tracking-wider px-3 py-1.5 rounded-full border border-slate-700 backdrop-blur-md z-10 shadow-lg">🔍 TAP ZOOM</span>
                            <img src="${currentImg}" loading="lazy" alt="Foto" onclick="openZoom('${currentImg}')" class="w-full h-full object-contain cursor-zoom-in hover:scale-105 transition duration-500" onerror="this.src='${DEFAULT_IMAGE}'">
                        </div>
                        
                        <!-- Panel Harga Jual -->
                        <div class="bg-gradient-to-b from-slate-900 to-slate-950 border border-amber-500/30 rounded-xl p-3 shadow-lg relative overflow-hidden group text-center flex flex-col justify-center">
                            <div class="absolute inset-0 bg-gradient-to-r from-amber-500/0 via-amber-500/5 to-amber-500/0 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-1000"></div>
                            <span class="text-[10px] font-bold uppercase tracking-widest text-amber-500/80 block mb-1">Harga Jual</span>
                            <div class="text-2xl font-black text-amber-400 font-mono drop-shadow-md">${textHargaJual}</div>
                            ${profitHtml}
                        </div>
                    </div>

                    <!-- Sisi Kanan (Tabel Harga HPP) -->
                    <div class="w-full md:w-3/5 flex flex-col gap-3 overflow-hidden">
                        <div class="flex items-center justify-between mt-2 md:mt-0 shrink-0">
                            <h3 class="text-sm font-bold text-slate-200 uppercase tracking-widest flex items-center gap-2 before:content-[''] before:block before:w-2 before:h-2 before:bg-teal-500 before:rounded-full">Rincian HPP Produksi</h3>
                            <span class="text-xs font-mono font-bold text-teal-400 bg-teal-500/10 px-2.5 py-1 rounded-md border border-teal-500/20 shadow-sm">Total HPP: Rp ${currentTotalHPP.toLocaleString('id-ID')}</span>
                        </div>
                        
                        <div class="flex-1 bg-slate-950/60 border border-slate-800 rounded-2xl overflow-y-auto overflow-x-auto min-h-[200px] max-h-[300px] md:max-h-[380px] shadow-inner">
                            <table class="w-full text-left border-collapse min-w-[320px]">
                                <thead class="bg-slate-900/95 sticky top-0 z-10 backdrop-blur-md shadow-sm border-b border-slate-700">
                                    <tr class="text-[9px] text-slate-400 uppercase tracking-wider">
                                        <th class="py-3 px-2 md:px-3 whitespace-nowrap">Proses</th>
                                        <th class="py-3 px-2 md:px-3">Spesifikasi Detail</th>
                                        <th class="py-3 px-2 md:px-3 text-right whitespace-nowrap">Tarif</th>
                                    </tr>
                                </thead>
                                <tbody>${rowsHtml}</tbody>
                            </table>
                        </div>

                        <!-- Tombol Aksi -->
                        <div class="flex gap-2 mt-auto shrink-0 pt-2">
                            <button onclick="copyDataToClipboard()" class="w-1/4 bg-slate-800 hover:bg-slate-700 active:scale-95 text-slate-300 text-sm font-bold rounded-xl shadow-lg transition-all flex items-center justify-center border border-slate-700" title="Salin Rincian">
                                📋
                            </button>
                            <button onclick="sendToWhatsApp()" class="w-3/4 bg-gradient-to-r from-emerald-600 to-emerald-500 hover:from-emerald-500 hover:to-emerald-400 active:scale-[0.98] text-white text-[11px] font-bold uppercase tracking-wider py-3.5 px-4 rounded-xl shadow-[0_4px_15px_rgba(16,185,129,0.3)] transition-all flex items-center justify-center gap-2 border border-emerald-400/30">
                                <span class="text-base">💬</span> Kirim SPK ke WhatsApp
                            </button>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('slideIndicator').innerHTML = `
                <span class="bg-slate-800 text-slate-300 px-2.5 py-1 rounded-md border border-slate-700">${currentSlideIndex + 1}</span> 
                <span class="text-slate-500">/</span> 
                <span class="bg-slate-800 text-slate-400 px-2.5 py-1 rounded-md border border-slate-700">${database.length}</span>
            `;
        }

        // FITUR PENCARIAN
        window.searchModel = function(query) {
            const dropdown = document.getElementById('searchDropdown');
            highlightedIndex = -1; 
            if (!query.trim()) { dropdown.classList.add('hidden'); return; }

            const results = database.filter(m => m.name.toLowerCase().includes(query.toLowerCase()));
            dropdown.innerHTML = '';
            if (results.length === 0) {
                dropdown.innerHTML = '<div class="p-4 text-xs text-slate-500 italic text-center">SKU tidak ditemukan</div>';
            } else {
                results.forEach((model) => {
                    const div = document.createElement('div');
                    div.className = "search-item p-3.5 text-xs font-medium text-slate-300 hover:bg-slate-800 hover:text-teal-400 cursor-pointer transition-colors flex justify-between items-center";
                    div.innerHTML = `<span class="uppercase tracking-wide">${model.name}</span> <span class="text-[10px] bg-slate-950 px-2 py-0.5 rounded border border-slate-700 text-slate-400">Pilih</span>`;
                    div.onclick = () => { selectModel(model); };
                    dropdown.appendChild(div);
                });
            }
            dropdown.classList.remove('hidden');
        }

        function selectModel(model) {
            currentSlideIndex = database.findIndex(m => m.name === model.name);
            document.getElementById('searchDropdown').classList.add('hidden');
            document.getElementById('searchInput').value = '';
            changeSlide('none'); 
        }

        document.getElementById('searchInput').addEventListener('keydown', function(e) {
            const items = document.querySelectorAll('.search-item');
            if (items.length === 0) return;
            if (e.key === 'ArrowDown') { e.preventDefault(); highlightedIndex = (highlightedIndex + 1) % items.length; updateHighlight(items); } 
            else if (e.key === 'ArrowUp') { e.preventDefault(); highlightedIndex = (highlightedIndex - 1 + items.length) % items.length; updateHighlight(items); } 
            else if (e.key === 'Enter') { e.preventDefault(); if (highlightedIndex >= 0) items[highlightedIndex].click(); }
        });

        function updateHighlight(items) {
            items.forEach((item, idx) => {
                item.classList.toggle('bg-slate-800', idx === highlightedIndex);
                item.classList.toggle('text-teal-400', idx === highlightedIndex);
                if (idx === highlightedIndex) item.scrollIntoView({ block: 'nearest' });
            });
        }

        document.addEventListener('keydown', function(event) {
            if (document.activeElement === document.getElementById('searchInput')) return; 
            if (event.key === 'ArrowRight') changeSlide('next');
            else if (event.key === 'ArrowLeft') changeSlide('prev');
        });
        document.addEventListener('click', e => { if (!e.target.closest('#searchInput')) document.getElementById('searchDropdown').classList.add('hidden'); });

        let touchStartX = 0, touchStartY = 0;
        document.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; touchStartY = e.changedTouches[0].screenY; }, { passive: true });
        document.addEventListener('touchend', e => {
            if (!document.getElementById('imageModal').classList.contains('hidden')) return;
            if (e.target.closest('table') || e.target.closest('.overflow-x-auto') || e.target.closest('button') || e.target.closest('input')) return; 
            const deltaX = e.changedTouches[0].screenX - touchStartX;
            const deltaY = e.changedTouches[0].screenY - touchStartY;
            if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > 50) {
                if (deltaX < 0) changeSlide('next'); else changeSlide('prev');
            }
        }, { passive: true });

        fetchSheetData();
        setInterval(() => fetchSheetData(true), 180000);
    </script>
</body>
</html>
