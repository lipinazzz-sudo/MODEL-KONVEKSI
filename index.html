<!DOCTYPE html>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }

</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col justify-start items-center p-6 overflow-y-auto relative">
    
    <div id="modalZoom" class="modal" onclick="this.style.display='none'">
        <img class="modal-isi" id="gambarBesar">
    </div>

    <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_right,rgba(20,184,166,0.04),transparent_50%)] pointer-events-none"></div>

    <header class="w-full max-w-7xl flex flex-col md:flex-row justify-between items-center gap-4 mb-6 relative z-50 bg-slate-900/40 border border-slate-900 p-4 rounded-2xl backdrop-blur-sm">
        <div class="flex items-center gap-3 shrink-0">
            <div class="w-10 h-10 rounded-full bg-teal-500/10 border border-slate-800 flex items-center justify-center text-lg">🦉</div>
            <div>
                <h1 class="text-xs font-bold tracking-tight text-slate-400">Model Konveksi Owlet</h1>
                <p class="text-[10px] text-emerald-400 flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span> LIVE</p>
            </div>
        </div>
        <div class="text-center md:flex-1 px-4" id="headerModelTitle"></div>
        <div class="w-full md:w-72 relative z-50 shrink-0">
            <input type="text" id="searchInput" oninput="searchModel(this.value)" placeholder="Cari model..." class="w-full bg-slate-950 border border-slate-800 rounded-xl pl-9 pr-4 py-2 text-xs text-slate-200 placeholder-slate-500 focus:outline-none focus:border-teal-500/50 transition">
            <div id="searchDropdown" class="absolute left-0 right-0 mt-1 bg-slate-900 border border-slate-800 rounded-xl hidden z-50 max-h-60 overflow-y-auto divide-y divide-slate-800/60"></div>
        </div>
    </header>

    <div id="slideContainer" class="w-full max-w-7xl bg-slate-900 border border-slate-800/80 rounded-2xl shadow-2xl p-6 relative z-10 min-h-[500px] flex flex-col justify-center"></div>

    <div class="mt-6 flex items-center gap-6 z-30 bg-slate-900/90 backdrop-blur border border-slate-800 px-5 py-2 rounded-full shadow-xl sticky bottom-4">
        <button onclick="prevSlide()" class="text-slate-400 hover:text-white transition font-bold text-md px-2">←</button>
        <span class="text-xs font-semibold text-slate-400 tracking-wider uppercase" id="slideIndicator">Memuat...</span>
        <button onclick="nextSlide()" class="text-slate-400 hover:text-white transition font-bold text-md px-2">→</button>
    </div>

    <script>
        const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1L24DsxwQ0uLxblnKzJ3YzH91gnsXuEhb8OVcRsH3WNo/export?format=csv&gid=0";
        let database = [];
        let currentSlideIndex = 0;
        const orderedCategories = ["OBRAS", "JAHIT", "KAM", "KARET", "BIS", "NECCI", "PACKING"];
        const DEFAULT_IMAGE = "https://images.unsplash.com/photo-1558769132-cb1aea458c5e?q=80&w=600&auto=format&fit=crop";

        function konversiLinkDrive(url) {
            const match = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
            return match ? `https://lh3.googleusercontent.com/d/${match[1]}` : url;
        }

        function bukaModal(src) {
            document.getElementById("gambarBesar").src = src;
            document.getElementById("modalZoom").style.display = "block";
        }

        async function fetchSheetData() {
            const res = await fetch(GOOGLE_SHEET_CSV_URL + "&cache_buster=" + Date.now());
            const text = await res.text();
            // (Logika parsing tetap sama, saya singkat untuk ruang)
            database = parseCSVToJSON(text);
            renderSlide();
        }

        function renderSlide() {
            const model = database[currentSlideIndex];
            const currentImg = model.image || DEFAULT_IMAGE;
            document.getElementById('slideContainer').innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-center">

                        <img src="${currentImg}" class="w-full rounded-xl hover:scale-105 transition duration-500" onerror="this.src='${DEFAULT_IMAGE}'">

</body>
</html>
